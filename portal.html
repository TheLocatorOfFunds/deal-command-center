<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://rcfaashkfpurkvtmsmeb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BjBJSBQC2iJXQodut3y3Ag_8aKyPmwv';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── Helpers ───────────────────────────────────────────
const fmt$ = (n) => {
  if (n == null || isNaN(n)) return "—";
  return "$" + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
};
const fmt$2 = (n) => {
  if (n == null || isNaN(n)) return "—";
  return "$" + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const fmtDate = (s) => {
  if (!s) return "—";
  const d = new Date(s);
  if (isNaN(d)) return "—";
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
};
const fmtDateShort = (s) => {
  if (!s) return "—";
  const d = new Date(s);
  if (isNaN(d)) return "—";
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};
const statusLabel = (s) => (s || "").replace(/-/g, ' ').toUpperCase();

// Filter activity to the events a client should see.
// Deliberately excludes expense/bonus/internal-task noise.
const CLIENT_ACTIVITY_PATTERNS = [
  /^status changed/i,
  /filed/i,
  /hearing/i,
  /court/i,
  /distribut/i,
  /payout/i,
  /recovered/i,
  /check /i,
  /signed/i,
  /motion/i,
  /order/i,
];
const isClientFacing = (action) => {
  if (!action) return false;
  return CLIENT_ACTIVITY_PATTERNS.some(r => r.test(action));
};

// ─── Status Intelligence ─────────────────────────────
// Every status gets a plain-English explanation of "what's happening now"
// plus a typical timeline and whether the client needs to take action.
function statusIntel(status, filedAt) {
  const filedDays = filedAt ? Math.floor((Date.now() - new Date(filedAt).getTime()) / 86400000) : 0;
  const filedPhrase = filedDays > 0 ? `${filedDays} days ago` : "recently";

  const messages = {
    'new-lead': {
      icon: '📋', tone: 'info',
      headline: "We've received your information",
      body: "Our team is reviewing your case to confirm the surplus amount and determine the fastest path to recovery. This typically takes one to three business days. You'll see the next update here as soon as the review is complete.",
      cta: null,
    },
    'contacted': {
      icon: '📞', tone: 'info',
      headline: "Our team has reached out to you",
      body: "A FundLocators specialist has contacted you to discuss your case. Please respond when you can — the sooner we can talk, the sooner we can begin your recovery.",
      cta: "If you haven't heard from us, call Nathan at (513) 516-2306.",
    },
    'awaiting-docs': {
      icon: '📄', tone: 'info',
      headline: "Waiting on a few documents",
      body: "We need a small set of documents from you to move forward (typically ID, proof of address, and any estate paperwork). Check your email for the specific list. As soon as we receive them, we'll prepare your claim for filing.",
      cta: "Questions about what to send? Call Nathan at (513) 516-2306.",
    },
    'signed': {
      icon: '✍️', tone: 'progress',
      headline: "Preparing your court filing",
      body: "Your engagement agreement is signed. Our team is drafting your formal surplus claim and preparing it for the court. Typical turnaround to filing: five to ten business days.",
      cta: null,
    },
    'probate': {
      icon: '⚖️', tone: 'progress',
      headline: "In probate proceedings",
      body: "The court is verifying rightful claimants through probate. This phase adds four to eight weeks and is a necessary step when estate matters are involved. Your case is on the standard Ohio track — not delayed.",
      cta: null,
    },
    'filed': {
      icon: '📎', tone: 'progress',
      headline: "Your claim is filed with the court",
      body: `Your formal claim was filed ${filedPhrase}. The case is active on the court's docket and we are now awaiting a scheduling order. Typical time from filing to payout in Ohio: three to six months.`,
      cta: null,
    },
    'hearing-set': {
      icon: '📅', tone: 'progress',
      headline: "A hearing has been scheduled",
      body: "The court has set a hearing date for your case. Your attorney will appear on your behalf — you do not need to attend. You'll see an update here the same day the hearing occurs.",
      cta: null,
    },
    'awaiting-distribution': {
      icon: '💰', tone: 'success',
      headline: "Distribution approved — funds are coming",
      body: "The court has approved the distribution of your surplus funds. The clerk's office will issue the check to us within two to four weeks. We'll transfer your share to you within twenty-four hours of receipt.",
      cta: "Nathan will call to confirm how you'd like to receive your funds — direct deposit, cashier's check, or wire.",
    },
    'recovered': {
      icon: '🎉', tone: 'celebration',
      headline: "Your funds have been recovered",
      body: "Congratulations. Nathan will reach out within twenty-four hours to confirm how you'd like to receive your share.",
      cta: null,
    },
    'dead': {
      icon: '⚠️', tone: 'error',
      headline: "Case has been closed without recovery",
      body: "We were unable to complete the recovery of surplus funds for your case. This is uncommon. Please call Nathan directly to discuss what happened and whether there is anything further we can explore.",
      cta: "Call Nathan at (513) 516-2306 to talk this through.",
    },
  };

  return messages[status] || {
    icon: '📁', tone: 'info',
    headline: "Your case is active",
    body: "Nathan and the team are moving your case forward. You'll see every meaningful update posted here. If anything about your circumstances changes, give Nathan a call.",
    cta: null,
  };
}

// Typical Ohio surplus case: 3-6 months from filing.
function payoutWindow(filedAt) {
  if (!filedAt) return null;
  const filed = new Date(filedAt);
  if (isNaN(filed)) return null;
  const earliest = new Date(filed); earliest.setDate(earliest.getDate() + 90);
  const latest = new Date(filed); latest.setDate(latest.getDate() + 180);
  return { earliest, latest, filed };
}

// ─── App ───────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setChecking(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if (checking) return <LoaderFull />;
  if (!session) return <SignIn />;
  return <PortalBody session={session} />;
}

// ─── Sign-in ───────────────────────────────────────────
function SignIn() {
  const [email, setEmail] = useState("");
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [error, setError] = useState(null);

  const send = async () => {
    setError(null);
    setSending(true);
    const { error } = await sb.auth.signInWithOtp({
      email: email.trim().toLowerCase(),
      options: { emailRedirectTo: window.location.href.split('#')[0] }
    });
    setSending(false);
    if (error) setError(error.message);
    else setSent(true);
  };

  return (
    <div className="centered-shell">
      <div className="card signin-card">
        <div className="brand" style={{ marginBottom: 24 }}>
          <span className="brand-dot"></span>
          FundLocators
          <span className="brand-tag">Case Portal</span>
        </div>
        {sent ? (
          <div>
            <div className="success-check">✓</div>
            <h1 className="serif">Check your email</h1>
            <p className="lead">We sent a secure sign-in link to <b>{email}</b>. Open the email and tap the button to access your case.</p>
            <p className="fineprint">The link is good for one hour and can only be used once. If you don't see the email within a minute, check your spam folder or contact Nathan directly at <a href="tel:+15135162306">(513) 516-2306</a>.</p>
          </div>
        ) : (
          <div>
            <h1>Welcome back.</h1>
            <p className="lead">Sign in to view the status of your surplus recovery case.</p>
            <input
              type="email"
              value={email}
              onChange={e => setEmail(e.target.value)}
              placeholder="you@email.com"
              autoFocus
              onKeyDown={e => { if (e.key === 'Enter' && email) send(); }}
            />
            <button className="btn-primary" onClick={send} disabled={!email || sending}>
              {sending ? "Sending…" : "Email me a sign-in link"}
            </button>
            {error && <div className="error">{error}</div>}
            <p className="fineprint">
              This portal is invite-only. Please use the email address you provided when you signed your engagement agreement.
              If you believe you should have access but can't sign in, contact Nathan at <a href="tel:+15135162306">(513) 516-2306</a>.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Portal (authenticated) ─────────────────────────────
function PortalBody({ session }) {
  const [state, setState] = useState({ loading: true });

  useEffect(() => {
    (async () => {
      // 1. Confirm client has access and which deal
      const { data: access, error: accessErr } = await sb
        .from('client_access')
        .select('*')
        .eq('user_id', session.user.id)
        .eq('enabled', true)
        .maybeSingle();

      if (accessErr || !access) {
        setState({ loading: false, error: 'no_access' });
        return;
      }

      // 2. Mark last seen (best-effort, don't block UI)
      sb.from('client_access').update({ last_seen_at: new Date().toISOString() }).eq('id', access.id);

      // 3. Fetch deal
      const { data: deal, error: dealErr } = await sb
        .from('deals')
        .select('*')
        .eq('id', access.deal_id)
        .maybeSingle();

      if (dealErr || !deal) {
        setState({ loading: false, error: 'deal_missing' });
        return;
      }

      // 4. Fetch activity (RLS will scope automatically)
      const { data: activity } = await sb
        .from('activity')
        .select('*')
        .eq('deal_id', access.deal_id)
        .order('created_at', { ascending: false })
        .limit(100);

      // 5. Fetch documents
      const { data: documents } = await sb
        .from('documents')
        .select('*')
        .eq('deal_id', access.deal_id)
        .order('created_at', { ascending: false });

      setState({
        loading: false,
        access,
        deal,
        activity: (activity || []).filter(a => isClientFacing(a.action)),
        documents: documents || [],
      });
    })();
  }, [session]);

  if (state.loading) return <LoaderFull />;
  if (state.error === 'no_access') return <NoAccess session={session} />;
  if (state.error === 'deal_missing') return <GenericError />;

  return <CaseView deal={state.deal} access={state.access} activity={state.activity} documents={state.documents} onSignOut={() => sb.auth.signOut()} />;
}

// ─── What's Happening Now ─────────────────────────────
function StatusIntel({ status, filedAt }) {
  const info = statusIntel(status, filedAt);
  return (
    <div className={"intel-card intel-" + info.tone}>
      <div className="intel-icon">{info.icon}</div>
      <div className="intel-body">
        <div className="intel-headline">{info.headline}</div>
        <div className="intel-text">{info.body}</div>
        {info.cta && <div className="intel-cta">{info.cta}</div>}
      </div>
    </div>
  );
}

// ─── Expected Payout Window ───────────────────────────
function TimelineExpectation({ filedAt, status }) {
  if (!filedAt) return null;
  if (['recovered', 'dead'].includes(status)) return null;
  const w = payoutWindow(filedAt);
  if (!w) return null;
  const daysSinceFiling = Math.floor((Date.now() - w.filed.getTime()) / 86400000);
  const daysToEarliest = Math.max(0, Math.floor((w.earliest.getTime() - Date.now()) / 86400000));
  const withinWindow = Date.now() >= w.earliest.getTime() && Date.now() <= w.latest.getTime();
  const pastWindow = Date.now() > w.latest.getTime();

  let note;
  if (pastWindow) {
    note = `Your case has been filed for ${daysSinceFiling} days — slightly longer than the typical range. This can happen when the court's docket is busy or if probate is involved. Nathan is monitoring it closely.`;
  } else if (withinWindow) {
    note = `You're now in the typical payout window. Most Ohio surplus cases resolve during this period.`;
  } else {
    note = `Filed ${daysSinceFiling} days ago. Typical Ohio surplus cases resolve 90 to 180 days after filing.`;
  }

  return (
    <div className="timeline-estimate">
      <div className="estimate-label">Expected Payout Window</div>
      <div className="estimate-range">{fmtDateShort(w.earliest)} — {fmtDateShort(w.latest)}</div>
      <div className="estimate-note">{note}</div>
    </div>
  );
}

// ─── Celebration Hero (status = recovered) ────────────
function CelebrationHero({ clientShare, address }) {
  return (
    <div className="celebration">

      <div className="celebration-amount">{fmt$2(clientShare)}</div>
      <div className="celebration-sub">
        The court has released the surplus from your case{address ? ` at ${address}` : ''}.
        Nathan will reach out within twenty-four hours to confirm how you'd like to receive your share — direct deposit, cashier's check, or wire.

    </div>

}

// ─── Testimonial Opt-In (anonymous, shown after recovery) ───
function TestimonialOptIn({ accessId, initialPrefs }) {
  const [prefs, setPrefs] = useState(initialPrefs || {});
  const [saving, setSaving] = useState(false);

  const consent = async (value) => {
    setSaving(true);
    const newPrefs = {
      ...prefs,
      public_story_consent: value,
      public_story_consent_at: new Date().toISOString(),
    };
    const { error } = await sb.from('client_access').update({ prefs: newPrefs }).eq('id', accessId);
    if (!error) setPrefs(newPrefs);
    setSaving(false);
  };

  if (prefs.public_story_consent === true) {
    return (
      <div className="testimonial-card">
        <div className="testimonial-confirmed">
          <span>✓</span>
          Thank you. Your story will help the next family find us.
        </div>
      </div>
    );
  }

  if (prefs.public_story_consent === false) {
    return null;
  }

  return (
    <div className="testimonial-card">
      <h3>Would you share your story — anonymously?</h3>
      <p>
        Only the county, the amount, and the timeline. No name, no address, no identifying details.
        Stories like yours help the next homeowner in the same situation trust us enough to reach out.
      </p>
      <div className="testimonial-actions">
        <button className="btn-secondary" style={{ background: 'var(--navy)', color: '#fffcf5', borderColor: 'var(--navy)' }} onClick={() => consent(true)} disabled={saving}>
          Yes, share anonymously
        </button>
        <button className="btn-secondary" onClick={() => consent(false)} disabled={saving}>
          Not this time
        </button>
      </div>
    </div>
  );
}

// ─── Sticky Call Nathan Button (mobile only) ──────────
function StickyCallButton() {
  return (
    <div className="sticky-call">
      <a href="tel:+15135162306">
        <span className="call-icon">📞</span>

}

// ─── Case View ─────────────────────────────────────────
function CaseView({ deal, access, activity, documents, onSignOut }) {
  const m = deal.meta || {};
  const estimatedSurplus = Number(m.estimatedSurplus) || 0;
  const feePct = Number(m.feePct) || 0;
  const ourFee = estimatedSurplus * feePct / 100;
  const clientShare = estimatedSurplus - ourFee;
  const attorney = m.attorney;
  const courtCase = m.courtCase;
  const county = m.county;
  const filedAt = m.filed_at || deal.filed_at;
  const statusCls = "status-" + (deal.status || "default");
  const isRecovered = deal.status === 'recovered';

  return (
    <div className="container">
      <header className="portal-header">
        <div className="brand">
          <span className="brand-dot"></span>
          FundLocators
          <span className="brand-tag">Case Portal</span>
        </div>
        <button className="btn-ghost" onClick={onSignOut}>Sign out</button>
      </header>

      <h1 className="deal-name">{deal.name}</h1>
      <div className="deal-sub">{county ? `${county} County, Ohio` : (deal.address || '')}</div>

      <span className={"status-badge " + statusCls}>{statusLabel(deal.status)}</span>

      {isRecovered ? (
        <CelebrationHero clientShare={clientShare} address={deal.address} />
      ) : (
        <>
          {estimatedSurplus > 0 && (
            <div className="payout-hero" style={{ marginTop: 18 }}>
              <div className="payout-label">Your Estimated Share</div>
              <div className="payout-amount">{fmt$2(clientShare)}</div>
              <div className="payout-sub">
                Based on an estimated surplus of {fmt$(estimatedSurplus)} with our {feePct}% contingency fee.
                The final amount will be confirmed by the court's distribution order.
              </div>
            </div>
          )}
          <StatusIntel status={deal.status} filedAt={filedAt} />
          <TimelineExpectation filedAt={filedAt} status={deal.status} />
        </>
      )}

      {/* Case details */}
      <div className="card">
        <p className="card-title">Case Details</p>
        <div className="stat-grid">
          <div className="stat">
            <div className="stat-label">Case Number</div>
            <div className="stat-value">{courtCase || 'Pending assignment'}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Filed Date</div>
            <div className="stat-value">{filedAt ? fmtDateShort(filedAt) : 'Not yet filed'}</div>
          </div>
          <div className="stat">
            <div className="stat-label">County</div>
            <div className="stat-value">{county || '—'}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Current Status</div>
            <div className="stat-value">{statusLabel(deal.status)}</div>
          </div>
        </div>

        {estimatedSurplus > 0 && (
          <div className="fee-breakdown">
            <div className="fee-line"><span>Estimated surplus funds</span><span className="amt">{fmt$2(estimatedSurplus)}</span></div>
            <div className="fee-line sub"><span>Our contingency fee ({feePct}%)</span><span className="amt">−{fmt$2(ourFee)}</span></div>
            <div className="fee-line total"><span>Your estimated share</span><span className="amt">{fmt$2(clientShare)}</span></div>
          </div>
        )}
      </div>

      {/* Your case team */}
      <div className="card">
        <p className="card-title">Your Case Team</p>
        {attorney && (
          <div className="team-row">
            <div className="team-avatar">{(attorney[0] || '?').toUpperCase()}</div>
            <div className="team-info">
              <div className="team-name">{attorney}</div>
              <div className="team-role">Attorney of record</div>
            </div>
          </div>
        )}
        <div className="team-row">
          <div className="team-avatar">N</div>
          <div className="team-info">
            <div className="team-name">Nathan Johnson</div>
            <div className="team-role">Principal, FundLocators</div>
            <div className="team-contact">
              <a href="tel:+15135162306">(513) 516-2306</a> &middot;{' '}
              <a href="mailto:nathan@fundlocators.com">nathan@fundlocators.com</a>
            </div>
          </div>
        </div>
      </div>

      {/* Timeline */}
      <div className="card">
        <p className="card-title">Case Timeline</p>
        {activity.length === 0 ? (
          <div className="empty">No case updates yet. We'll post updates here as your case progresses.</div>
        ) : (
          activity.map((a, i) => (
            <div className="timeline-item" key={a.id || i}>
              <div className="timeline-dot"></div>
              <div className="timeline-action">{a.action}</div>
              <div className="timeline-date">{fmtDateShort(a.created_at)}</div>

      {/* Documents */}
      <div className="card">
        <p className="card-title">Documents</p>
        {documents.length === 0 ? (
          <div className="empty">No documents on file yet. Your signed engagement agreement and any court filings will appear here as they're recorded.</div>

      <p className="fineprint" style={{ textAlign: 'center', marginTop: 32 }}>

      </p>

      <StickyCallButton />
    </div>
  );

async function openDocument(path) {
  if (!path) return;
  const { data, error } = await sb.storage.from('deal-docs').createSignedUrl(path, 300);
  if (error || !data?.signedUrl) {
    alert("We couldn't open that document. Please call Nathan at (513) 516-2306 and we'll send it over directly.");
    return;
  }
  window.open(data.signedUrl, '_blank');
}
