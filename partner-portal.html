<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1f3a">
<title>JV Deal Room — RefundLocators</title>
<link rel="preconnect" href="https://rcfaashkfpurkvtmsmeb.supabase.co">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbf8f1;
    --bg-card: #ffffff;
    --bg-card-alt: #f4ecdc;
    --navy: #0b1f3a;
    --navy-mid: #17355e;
    --gold: #c9a24a;
    --gold-light: #d8b560;
    --gold-soft: #ede5cf;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-subtle: #9a9a9a;
    --border: #e5dfd0;
    --border-strong: #c9bea3;
    --green: #2d7a4f;
    --green-soft: #dff3e6;
    --amber: #a5731c;
    --red: #a83232;
    --shadow: 0 1px 2px rgba(11,31,58,.06), 0 8px 24px rgba(11,31,58,.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif; background: var(--bg); color: var(--text); line-height: 1.55; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  .serif { font-family: 'Fraunces',Georgia,serif; font-weight: 500; letter-spacing: -0.01em; }
  .mono { font-family: 'DM Mono',monospace; }
  .container { max-width: 920px; margin: 0 auto; padding: 24px 20px 80px; }
  .centered-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); }
  .card + .card { margin-top: 18px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin: 0 0 16px; }

  header.portal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-top: 8px; gap: 12px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: 'Fraunces',serif; font-weight: 700; font-size: 20px; color: var(--navy); letter-spacing: -0.01em; }
  .brand-dot { width: 9px; height: 9px; background: var(--gold); border-radius: 50%; }
  .brand-tag { font-family: 'Inter',sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-left: 6px; padding-top: 3px; }

  .hero-photo { width: 100%; aspect-ratio: 16 / 9; background: var(--bg-card-alt) center center / cover no-repeat; border-radius: 14px; margin-bottom: 22px; border: 1px solid var(--border); }
  .hero-photo-placeholder { display: flex; align-items: center; justify-content: center; color: var(--text-subtle); font-size: 14px; height: 100%; }

  h1.deal-name { font-family: 'Fraunces',serif; font-weight: 500; font-size: 32px; line-height: 1.15; color: var(--navy); margin: 0 0 4px; letter-spacing: -0.02em; }
  .deal-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 6px; }
  .deal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0 22px; }
  .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .pill-gold { background: var(--gold-soft); color: var(--amber); }
  .pill-navy { background: #e6edf7; color: var(--navy-mid); }
  .pill-green { background: var(--green-soft); color: var(--green); }

  /* Quiet role card — replaces the old "25%" hero. Same footprint as other cards. */
  .role-card-share { font-size: 11px; color: var(--text-muted); }
  .role-card-share b { color: var(--navy); font-weight: 600; }

  .num-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .num-tile { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .num-tile-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .num-tile-value { font-family: 'Fraunces',serif; font-size: 22px; font-weight: 500; color: var(--navy); letter-spacing: -0.015em; }
  .num-tile-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px 20px; }
  .stat-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-value { font-size: 15px; color: var(--text); margin-top: 2px; font-weight: 500; }
  .stat-value.muted { color: var(--text-subtle); font-style: italic; }
  .stat-value a { color: var(--navy); text-decoration: none; }
  .stat-value a:hover { text-decoration: underline; }

  .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .photo-thumb { aspect-ratio: 4/3; background: var(--bg-card-alt) center center / cover no-repeat; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: transform .12s; }
  .photo-thumb:hover { transform: scale(1.02); }

  .doc-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .doc-row:last-child { border-bottom: none; }
  .doc-name { font-size: 13px; color: var(--navy); font-weight: 500; }
  .doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .btn-gold { background: var(--navy); color: #fffcf5; padding: 8px 16px; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-block; }
  .btn-gold:hover { background: var(--navy-mid); }
  .btn-ghost { background: transparent; border: 1px solid var(--border-strong); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }

  .cta-bar { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0 22px; }
  .cta-primary { background: var(--navy); color: #fffcf5; padding: 14px 22px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
  .cta-primary:hover { background: var(--navy-mid); }
  .cta-secondary { background: var(--bg-card); color: var(--navy); padding: 14px 22px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }

  .fineprint { font-size: 12px; color: var(--text-subtle); }
  .empty { color: var(--text-muted); font-size: 13px; font-style: italic; padding: 16px 0; }

  .lightbox { position: fixed; inset: 0; background: rgba(11,31,58,.85); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; cursor: zoom-out; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }

  /* Tasks */
  .task-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .task-row:last-child { border-bottom: none; }
  .task-check {
    width: 22px; height: 22px; flex-shrink: 0; margin-top: 1px;
    border: 2px solid var(--border-strong); border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .12s; background: var(--bg-card);
  }
  .task-check:hover { border-color: var(--navy); }
  .task-check.done { background: var(--green); border-color: var(--green); color: #fff; }
  .task-text { flex: 1; }
  .task-title { font-size: 14px; color: var(--text); }
  .task-title.done { color: var(--text-muted); text-decoration: line-through; }
  .task-due { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Activity feed */
  .activity-row { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
  .activity-row:last-child { border-bottom: none; }
  .activity-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Post update */
  .compose textarea {
    width: 100%; min-height: 80px; padding: 12px;
    border: 1px solid var(--border-strong); border-radius: 8px;
    font-family: inherit; font-size: 14px; resize: vertical; background: var(--bg-card);
  }
  .compose textarea:focus { outline: none; border-color: var(--navy); }

  @media (max-width: 520px) {
    h1.deal-name { font-size: 24px; }
    .container { padding: 16px 14px 60px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- heic2any: client-side HEIC → JPEG for iPhone photo uploads. ~150KB,
     loads on demand. iOS Safari can decode HEIC natively but Chrome/desktop
     browsers can't, and DCC + email previews need JPEG to display them. -->
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;
const SUPABASE_URL = 'https://rcfaashkfpurkvtmsmeb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BjBJSBQC2iJXQodut3y3Ag_8aKyPmwv';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const url = new URL(window.location.href);
const TOKEN = url.searchParams.get('t') || url.searchParams.get('token');

const fmtMoney = v => {
  if (v == null || v === '') return null;
  const n = typeof v === 'number' ? v : parseFloat(String(v).replace(/[^0-9.-]/g,''));
  if (Number.isNaN(n) || n === 0) return null;
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
};
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) : null;
const fmtDateTime = d => d ? new Date(d).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : null;
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;

function App() {
  const [state, setState] = useState({ loading: true, data: null, error: null });

  const refresh = async () => {
    if (!TOKEN) { setState({ loading: false, data: null, error: 'no-token' }); return; }
    const { data, error } = await sb.rpc('get_partner_deal_by_token', { p_token: TOKEN });
    if (error) { setState({ loading: false, data: null, error: error.message }); return; }
    if (!data) { setState({ loading: false, data: null, error: 'invalid-token' }); return; }
    setState({ loading: false, data, error: null });
  };

  useEffect(() => { refresh(); /* eslint-disable-next-line */ }, []);

  if (state.loading) return <LoaderFull />;
  if (state.error || !state.data) return <InvalidLink error={state.error} />;
  return <DealRoom data={state.data} onRefresh={refresh} />;
}

function LoaderFull() {
  return <div className="centered-shell"><div className="card" style={{ padding: 40, textAlign: 'center' }}>
    <div className="brand" style={{ justifyContent: 'center', marginBottom: 20 }}>
      <span className="brand-dot"></span>
      RefundLocators
      <span className="brand-tag">JV Deal Room</span>
    </div>
    <div className="fineprint">Loading deal…</div>
  </div></div>;
}

function InvalidLink({ error }) {
  const msg = error === 'no-token' ? 'This link is missing its access code. Check the full URL Nathan sent you.' :
              error === 'invalid-token' ? 'This link is no longer valid. It may have been revoked. Reach out to Nathan for a refresh.' :
              'We couldn\'t load this deal. Please try again or contact Nathan.';
  return <div className="centered-shell"><div className="card" style={{ padding: 40, maxWidth: 480, textAlign: 'center' }}>
    <div className="brand" style={{ justifyContent: 'center', marginBottom: 20 }}>
      <span className="brand-dot"></span>
      RefundLocators
      <span className="brand-tag">JV Deal Room</span>
    </div>
    <h1 className="serif" style={{ fontSize: 20, color: 'var(--navy)', marginBottom: 12 }}>Link not active</h1>
    <p style={{ color: 'var(--text-muted)', fontSize: 14, lineHeight: 1.55, marginBottom: 20 }}>{msg}</p>
    <a href="tel:+15135162306" className="btn-gold">📞 Call Nathan · (513) 516-2306</a>
  </div></div>;
}

function isImage(d) {
  return d.is_image || /\.(jpg|jpeg|png|webp|heic|gif)$/i.test(d.name || '');
}
function isVideo(d) {
  return d.is_video || /\.(mp4|mov|m4v|webm|avi|mkv)$/i.test(d.name || '');
}
function isMedia(d) { return isImage(d) || isVideo(d); }

async function resolvePartnerAsset(document_id) {
  // Look up the bucket path via RPC, then sign it client-side using anon key.
  // The RPC validates the token + partner_visible flag — anon callers without
  // a valid token get null back.
  const { data: path, error } = await sb.rpc('get_partner_document_url', { p_token: TOKEN, p_document_id: document_id });
  if (error || !path) return null;
  const { data: signed, error: e2 } = await sb.storage.from('deal-docs').createSignedUrl(path, 3600);
  if (e2 || !signed) return null;
  return signed.signedUrl;
}

function DealRoom({ data, onRefresh }) {
  const { deal, documents, tasks, activity, partner_name, profit_share_pct, role_description } = data;
  const partner = deal.partner || {};
  const address = partner.propertyAddress || deal.headline_address;
  const county = deal.county;

  const photos = (documents || []).filter(isMedia);             // photos + videos in the gallery
  const files  = (documents || []).filter(d => !isMedia(d));     // everything else (PDFs, etc) below
  const coverDoc = photos.find(p => p.is_cover && isImage(p)) || photos.find(isImage); // cover must be an image

  const [coverUrl, setCoverUrl] = useState(null);
  const [photoUrls, setPhotoUrls] = useState({});
  const [lightbox, setLightbox] = useState(null);

  useEffect(() => {
    if (!coverDoc) return;
    (async () => {
      const u = await resolvePartnerAsset(coverDoc.id);
      if (u) setCoverUrl(u);
    })();
  }, [coverDoc?.id]);

  // Parallel-fetch signed URLs for all photos. The previous version awaited
  // them one-by-one which was 70 × ~300ms = 21s on a fresh page load with
  // 70 photos — enough that Kevin's phone never finished and the gallery
  // looked broken. Now we run with concurrency 10 (avoid hammering Supabase
  // with 70 simultaneous requests) and stream results into state as each
  // batch lands so thumbnails appear progressively, top-of-gallery first.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const queue = photos.filter(p => p.id !== coverDoc?.id).map(p => p.id);
      if (!queue.length) return;
      const CONCURRENCY = 10;
      // Workers pull from the queue and call resolve concurrently; each
      // resolved URL flushes into state immediately so the user sees photos
      // appear as they load instead of waiting for a giant batch.
      const worker = async () => {
        while (!cancelled && queue.length) {
          const id = queue.shift();
          if (!id) break;
          const u = await resolvePartnerAsset(id);
          if (cancelled) return;
          if (u) setPhotoUrls(prev => ({ ...prev, [id]: u }));
        }
      };
      await Promise.all(Array.from({ length: Math.min(CONCURRENCY, queue.length) }, worker));
    })();
    return () => { cancelled = true; };
  }, [photos.length]);

  // Profit-share math: pull deal economics from meta.partner
  const askingPrice    = Number(partner.askingPrice) || 0;
  const contractPrice  = Number(partner.contractPrice) || 0;
  const expectedFee    = Number(partner.expectedAssignmentFee) || 0;
  const expectedNet    = Number(partner.expectedNetProfit) || expectedFee || 0;
  const sharePct       = Number(profit_share_pct) || 0;
  const partnerCut     = expectedNet > 0 ? Math.round(expectedNet * sharePct / 100) : null;

  const buyer = partner.buyer || {};
  const title = partner.title || {};
  const closeDate = partner.expectedCloseDate || partner.closingDate;

  return (
    <div className="container">
      <header className="portal-header">
        <div className="brand">
          <span className="brand-dot"></span>
          RefundLocators
          <span className="brand-tag">JV Deal Room</span>
        </div>
        {partner_name && <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>Partner: <b style={{ color: 'var(--navy)' }}>{partner_name}</b></div>}
      </header>

      <div className="hero-photo" style={coverUrl ? { backgroundImage: `url(${coverUrl})` } : {}}>
        {!coverUrl && <div className="hero-photo-placeholder">Photos coming</div>}
      </div>

      <h1 className="deal-name">{address || deal.name}</h1>
      <div className="deal-sub">{county && <>{county} County · </>}Ohio · {cap(deal.type || 'wholesale')}</div>

      <div className="deal-tags">
        {deal.status && <span className="pill pill-navy">{cap(String(deal.status).replace(/-/g, ' '))}</span>}
        {partner.dealType && <span className="pill pill-gold">{cap(partner.dealType)}</span>}
      </div>

      {/* Quiet role card — replaces the old hero. Profit share lives as a
           short line at the bottom; the focus is the role + the work. */}
      {(role_description || sharePct > 0) && (
        <div className="card" style={{ padding: '16px 22px' }}>
          {role_description && (
            <div style={{ fontSize: 14, color: 'var(--text)', lineHeight: 1.55 }}>
              <span className="card-title" style={{ display: 'inline-block', marginBottom: 0, marginRight: 10 }}>Your role</span>
              {role_description}
            </div>
          )}
          {sharePct > 0 && (
            <div className="role-card-share" style={{ marginTop: role_description ? 8 : 0 }}>
              <b>{sharePct}%</b> on close
              {partnerCut != null && <> · projected ≈ {fmtMoney(partnerCut)}</>}
            </div>
          )}
        </div>
      )}

      {/* Deal economics tiles */}
      {(askingPrice || contractPrice || expectedFee) > 0 && (
        <div className="num-tiles">
          {contractPrice > 0 && <Tile label="Under contract at" value={fmtMoney(contractPrice)} />}
          {askingPrice > 0 && <Tile label="Asking buyer" value={fmtMoney(askingPrice)} />}
          {expectedFee > 0 && <Tile label="Assignment fee" value={fmtMoney(expectedFee)} />}
          {closeDate && <Tile label="Target close" value={fmtDate(closeDate)} />}
        </div>
      )}

      <div className="cta-bar">
        <a href="tel:+15135162306" className="cta-primary">📞 Call Nathan</a>
        <a href="sms:+15135162306" className="cta-secondary">💬 Text</a>
      </div>

      {/* Property */}
      <div className="card">
        <p className="card-title">The property</p>
        <div className="stat-grid">
          <Stat label="Address" value={address} />
          {partner.beds      && <Stat label="Beds" value={partner.beds} />}
          {partner.baths     && <Stat label="Baths" value={partner.baths} />}
          {partner.sqft      && <Stat label="Sqft" value={Number(partner.sqft).toLocaleString('en-US')} />}
          {partner.yearBuilt && <Stat label="Year built" value={partner.yearBuilt} />}
          {partner.lotSize   && <Stat label="Lot" value={partner.lotSize} />}
          {partner.occupancy && <Stat label="Occupancy" value={cap(partner.occupancy)} />}
          {partner.condition && <Stat label="Condition" value={cap(partner.condition)} />}
        </div>
      </div>

      {/* Buyer */}
      {(buyer.name || buyer.phone || buyer.email || buyer.notes) && (
        <div className="card">
          <p className="card-title">Buyer</p>
          <div className="stat-grid">
            {buyer.name  && <Stat label="Name" value={buyer.name} />}
            {buyer.phone && <Stat label="Phone" value={<a href={`tel:${buyer.phone}`}>{buyer.phone}</a>} />}
            {buyer.email && <Stat label="Email" value={<a href={`mailto:${buyer.email}`}>{buyer.email}</a>} />}
            {buyer.entity && <Stat label="Entity" value={buyer.entity} />}
          </div>
          {buyer.notes && <div style={{ marginTop: 14, padding: 12, background: 'var(--bg-card-alt)', borderRadius: 8, fontSize: 13, color: 'var(--text)' }}>{buyer.notes}</div>}
        </div>
      )}

      {/* Title */}
      {(title.company || title.contact || title.phone || title.email) && (
        <div className="card">
          <p className="card-title">Title company</p>
          <div className="stat-grid">
            {title.company && <Stat label="Company" value={title.company} />}
            {title.contact && <Stat label="Contact" value={title.contact} />}
            {title.phone   && <Stat label="Phone" value={<a href={`tel:${title.phone}`}>{title.phone}</a>} />}
            {title.email   && <Stat label="Email" value={<a href={`mailto:${title.email}`}>{title.email}</a>} />}
            {title.fileNumber && <Stat label="File #" value={title.fileNumber} />}
          </div>
        </div>
      )}

      {/* Tasks */}
      {tasks && tasks.length > 0 && (
        <div className="card">
          <p className="card-title">Your checklist</p>
          {tasks.map(t => <TaskRow key={t.id} task={t} onChange={onRefresh} />)}
        </div>
      )}

      {/* Photos */}
      <div className="card">
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, marginBottom: 14 }}>
          <p className="card-title" style={{ margin: 0 }}>Photos</p>
          <PhotoUploader onUploaded={onRefresh} />
        </div>
        {photos.length === 0 ? (
          <div className="empty">No photos or videos yet. Tap <b>+ Upload photos / videos</b> above — Nathan sees them instantly. Drag-and-drop works on desktop.</div>
        ) : (
          <div className="photos-grid">
            {photos.map(p => {
              const u = p.id === coverDoc?.id ? coverUrl : photoUrls[p.id];
              if (isVideo(p)) {
                // Videos: render an inline <video> with controls. Tap-to-fullscreen via the native player.
                return (
                  <div key={p.id} className="photo-thumb" style={{ background: '#000', position: 'relative' }}>
                    {u ? (
                      <video src={u} controls preload="metadata" playsInline
                        style={{ width: '100%', height: '100%', objectFit: 'cover', borderRadius: 8 }} />
                    ) : (
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: 'var(--text-subtle)', fontSize: 12 }}>Loading video…</div>
                    )}
                    <div style={{ position: 'absolute', top: 6, left: 6, background: 'rgba(0,0,0,.6)', color: '#fff', fontSize: 10, fontWeight: 700, padding: '2px 6px', borderRadius: 4, letterSpacing: '0.05em' }}>VIDEO</div>
                  </div>
                );
              }
              // Photos: existing tap-to-lightbox
              return (
                <div key={p.id} className="photo-thumb"
                  style={u ? { backgroundImage: `url(${u})` } : {}}
                  onClick={() => u && setLightbox(u)} />
              );
            })}
          </div>
        )}
      </div>

      {/* Documents (non-image) */}
      {files.length > 0 && (
        <div className="card">
          <p className="card-title">Documents</p>
          {files.map(d => <DocRow key={d.id} doc={d} />)}
        </div>
      )}

      {/* Activity feed (read) + post update (write) */}
      <div className="card">
        <p className="card-title">Activity</p>
        <PostUpdate onPosted={onRefresh} />
        {(!activity || activity.length === 0) ? (
          <div className="empty">No activity yet. Updates you post and what the team does will show here.</div>
        ) : (
          <div style={{ marginTop: 16 }}>
            {activity.map(a => (
              <div key={a.id} className="activity-row">
                {a.action}
                <div className="activity-meta">{a.author} · {fmtDateTime(a.created_at)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{ marginTop: 30, paddingTop: 20, borderTop: '1px solid var(--border)', textAlign: 'center' }}>
        <div className="fineprint">Private deal room. Don't share this link — it's tied to you.</div>
      </div>

      {lightbox && (
        <div className="lightbox" onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="" />
        </div>
      )}
    </div>
  );
}

function Tile({ label, value, sub }) {
  return <div className="num-tile">
    <div className="num-tile-label">{label}</div>
    <div className="num-tile-value">{value}</div>
    {sub && <div className="num-tile-sub">{sub}</div>}
  </div>;
}

function Stat({ label, value }) {
  if (!value) return null;
  return <div>
    <div className="stat-label">{label}</div>
    <div className="stat-value">{value}</div>
  </div>;
}

function TaskRow({ task, onChange }) {
  const [busy, setBusy] = useState(false);
  const toggle = async () => {
    setBusy(true);
    const newDone = !task.done;
    await sb.rpc('partner_complete_task', { p_token: TOKEN, p_task_id: task.id, p_done: newDone });
    setBusy(false);
    onChange();
  };
  return (
    <div className="task-row">
      <div className={'task-check' + (task.done ? ' done' : '')} onClick={busy ? null : toggle}>
        {task.done && '✓'}
      </div>
      <div className="task-text">
        <div className={'task-title' + (task.done ? ' done' : '')}>{task.title}</div>
        {task.due_date && <div className="task-due">Due {fmtDate(task.due_date)}</div>}
        {task.completed_by_partner_at && <div className="task-due">Completed {fmtDateTime(task.completed_by_partner_at)}</div>}
      </div>
    </div>
  );
}

function DocRow({ doc }) {
  const [url, setUrl] = useState(null);
  const [loading, setLoading] = useState(false);
  const open = async () => {
    if (url) { window.open(url, '_blank'); return; }
    setLoading(true);
    const u = await resolvePartnerAsset(doc.id);
    setLoading(false);
    if (u) { setUrl(u); window.open(u, '_blank'); }
  };
  return (
    <div className="doc-row">
      <div>
        <div className="doc-name">{doc.name}</div>
        <div className="doc-meta">{doc.document_type || 'Document'} · {fmtDate(doc.created_at)}</div>
      </div>
      <button className="btn-ghost" onClick={open} disabled={loading}>{loading ? '…' : 'Open'}</button>
    </div>
  );
}

// Direct-to-storage upload: works for photos AND videos of any size up to
// Supabase's 5 GB storage object limit. Three steps per file:
//   1. partner_request_upload RPC → creates 'pending' documents row, returns path
//   2. POST /functions/v1/partner-upload-url → returns signed PUT URL
//   3. fetch PUT signedUrl → file body uploads directly (no EF body limit)
//   4. partner_finalize_upload RPC → flips row to 'complete' + activity log
// Falls back to partner-abandon-upload if the user cancels or it fails.
function PhotoUploader({ onUploaded }) {
  const [busy, setBusy]         = useState(false);
  const [files, setFiles]       = useState([]); // [{name, total, sent, status, err, docId}]
  const [globalErr, setGlobalErr] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const inputRef = React.useRef(null);

  const onPick = () => inputRef.current && inputRef.current.click();

  const fmtBytes = (n) => {
    if (!n || n < 1024) return (n || 0) + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
    if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
    return (n / 1024 / 1024 / 1024).toFixed(2) + ' GB';
  };

  // PUT one file using XHR so we can stream upload progress to the UI.
  // fetch() doesn't expose request body progress — XHR does.
  const putWithProgress = (signedUrl, file, onProg) => new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', signedUrl, true);
    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
    xhr.upload.onprogress = (e) => { if (e.lengthComputable) onProg(e.loaded); };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) resolve();
      else reject(new Error('PUT failed: ' + xhr.status + ' ' + xhr.statusText));
    };
    xhr.onerror = () => reject(new Error('network error during upload'));
    xhr.onabort = () => reject(new Error('upload aborted'));
    xhr.send(file);
  });

  // HEIC detection: iPhone photos arrive as image/heic OR image/heif (or
   //   sometimes application/octet-stream with .heic extension). We convert
   //   them to JPEG before upload so DCC, email previews, and non-Apple
   //   browsers can display them without extra plumbing.
  const isHeic = (f) => {
    if (!f) return false;
    if (/heic|heif/i.test(f.type || '')) return true;
    if (/\.(heic|heif)$/i.test(f.name || '')) return true;
    return false;
  };

  const convertHeicToJpeg = async (file) => {
    if (!window.heic2any) throw new Error('HEIC converter not loaded');
    const blob = await window.heic2any({ blob: file, toType: 'image/jpeg', quality: 0.9 });
    const jpegBlob = Array.isArray(blob) ? blob[0] : blob;
    const newName = file.name.replace(/\.(heic|heif)$/i, '.jpg');
    return new File([jpegBlob], newName, { type: 'image/jpeg', lastModified: file.lastModified });
  };

  const uploadOne = async (rawFile, idx) => {
    const updateRow = (patch) => setFiles(prev => prev.map((f, i) => i === idx ? { ...f, ...patch } : f));
    let docId = null;
    try {
      // Pre-step: HEIC → JPEG. Photos from iPhone camera roll default to HEIC.
      // Conversion runs in the browser — no server roundtrip. Slow files
      // (8-10MB HEICs) take ~1-2s on a recent iPhone.
      let file = rawFile;
      if (isHeic(rawFile)) {
        updateRow({ status: 'converting' });
        try {
          file = await convertHeicToJpeg(rawFile);
        } catch (convErr) {
          // If conversion fails (rare), fall back to uploading the original
          // HEIC. Better to have the file than to fail the upload.
          console.warn('HEIC conversion failed, uploading original:', convErr);
          file = rawFile;
        }
      }

      // 1. Request upload slot — creates documents row in pending state
      const { data: req, error: reqErr } = await sb.rpc('partner_request_upload', {
        p_token: TOKEN,
        p_filename: file.name,
        p_size: file.size,
        p_mime: file.type || null,
      });
      if (reqErr) throw new Error('request slot: ' + reqErr.message);
      if (!req || !req.document_id) throw new Error('could not allocate upload slot');
      docId = req.document_id;
      updateRow({ docId });

      // 2. Get signed PUT URL
      const r = await fetch(SUPABASE_URL + '/functions/v1/partner-upload-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'x-partner-token': TOKEN },
        body: JSON.stringify({ path: req.path, document_id: req.document_id }),
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok || !j.signedUrl) throw new Error(j.error || ('signing failed: ' + r.status));

      // 3. PUT directly to storage with progress
      updateRow({ status: 'uploading' });
      await putWithProgress(j.signedUrl, file, (sent) => updateRow({ sent }));

      // 4. Finalize — flip to complete + log activity
      const { data: ok, error: finErr } = await sb.rpc('partner_finalize_upload', {
        p_token: TOKEN,
        p_document_id: docId,
        p_final_size: file.size,
      });
      if (finErr || !ok) throw new Error(finErr?.message || 'finalize failed');

      updateRow({ status: 'done', sent: file.size });
      return true;
    } catch (ex) {
      updateRow({ status: 'failed', err: ex.message || String(ex) });
      // Best-effort cleanup
      if (docId) {
        try { await sb.rpc('partner_abandon_upload', { p_token: TOKEN, p_document_id: docId }); } catch {}
      }
      return false;
    }
  };

  const handleFileList = async (fileList) => {
    const arr = Array.from(fileList || []);
    if (!arr.length) return;
    setGlobalErr(null);
    const initial = arr.map(f => ({ name: f.name, total: f.size, sent: 0, status: 'queued', err: null, docId: null }));
    setFiles(initial);
    setBusy(true);

    // Run uploads in parallel (max 3 at a time so phones don't choke)
    const queue = arr.map((f, i) => ({ file: f, idx: i }));
    let succeeded = 0;
    const workers = Array.from({ length: Math.min(3, queue.length) }, async () => {
      while (queue.length) {
        const next = queue.shift();
        if (!next) break;
        const ok = await uploadOne(next.file, next.idx);
        if (ok) succeeded++;
      }
    });
    await Promise.all(workers);

    setBusy(false);
    if (inputRef.current) inputRef.current.value = '';
    if (succeeded > 0) onUploaded();
    // Auto-clear successful rows after 3s so the panel doesn't grow forever
    setTimeout(() => setFiles(prev => prev.filter(f => f.status !== 'done')), 3000);
  };

  const onFiles = (e) => handleFileList(e.target.files);

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    handleFileList(e.dataTransfer?.files);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'flex-end' }}>
      {/* No capture attribute — iOS shows the native action sheet
          (Photo Library / Take Photo or Video / Choose Files) so Kevin
          can pick from his roll OR take fresh shots. With capture set,
          iOS skips the menu and jumps straight into the camera, which
          left no way to upload existing photos. */}
      <input
        ref={inputRef}
        type="file"
        accept="image/*,video/*"
        multiple
        onChange={onFiles}
        style={{ display: 'none' }}
      />
      <div
        onClick={onPick}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={onDrop}
        style={{
          cursor: 'pointer',
          padding: '10px 18px',
          borderRadius: 8,
          background: dragOver ? 'var(--gold-soft)' : 'var(--navy)',
          color: dragOver ? 'var(--navy)' : '#fffcf5',
          fontSize: 13,
          fontWeight: 600,
          border: dragOver ? '2px dashed var(--gold)' : '2px solid transparent',
          transition: 'all .12s',
          textAlign: 'center',
          minWidth: 200,
        }}
      >
        {busy ? 'Uploading…' : (dragOver ? 'Drop to upload' : '+ Upload photos / videos')}
      </div>
      {!busy && !files.length && (
        <div style={{ fontSize: 10, color: 'var(--text-subtle)' }}>
          Or drag-and-drop · phone camera roll OK · videos OK
        </div>
      )}
      {globalErr && <span style={{ fontSize: 11, color: 'var(--red)' }}>{globalErr}</span>}
      {files.length > 0 && (
        <div style={{ width: '100%', minWidth: 280, marginTop: 6, display: 'flex', flexDirection: 'column', gap: 4 }}>
          {files.map((f, i) => {
            const pct = f.total > 0 ? Math.round((f.sent / f.total) * 100) : 0;
            const color = f.status === 'failed' ? 'var(--red)'
                         : f.status === 'done'    ? 'var(--green)'
                         : 'var(--navy)';
            return (
              <div key={i} style={{ fontSize: 11, padding: '6px 8px', background: 'var(--bg-card-alt)', borderRadius: 6, display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</div>
                <div style={{ color, fontWeight: 600, fontSize: 10, fontFamily: "'DM Mono', monospace", whiteSpace: 'nowrap' }}>
                  {f.status === 'done' ? '✓ ' + fmtBytes(f.total)
                   : f.status === 'failed' ? '✗ ' + (f.err || 'failed')
                   : f.status === 'converting' ? 'converting HEIC…'
                   : pct + '%'}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PostUpdate({ onPosted }) {
  const [body, setBody] = useState('');
  const [busy, setBusy] = useState(false);
  const post = async () => {
    const trimmed = body.trim();
    if (!trimmed) return;
    setBusy(true);
    const { error } = await sb.rpc('partner_post_update', { p_token: TOKEN, p_message: trimmed });
    setBusy(false);
    if (error) { alert('Could not post: ' + error.message); return; }
    setBody('');
    onPosted();
  };
  return (
    <div className="compose">
      <textarea
        value={body}
        onChange={e => setBody(e.target.value)}
        placeholder="Post an update — Nathan sees it instantly. Examples: 'Pictures done, uploaded to Dropbox' / 'Title quote came back at $X' / 'Buyer wants to push close to Friday.'"
      />
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 8 }}>
        <button className="btn-gold" onClick={post} disabled={busy || !body.trim()}>
          {busy ? 'Posting…' : 'Post update'}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
