const hasStorage = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";

async function safeLoad(key, seed) {
  if (!hasStorage) return seed;
  try {
    const r = await Promise.race([
      window.storage.get(key, true),
      new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 2500)),
    ]);
    if (r && r.value) {
      try { return JSON.parse(r.value); } catch { return seed; }
    }
    return seed;
  } catch {
    return seed;
  }
}

async function safeSave(key, value) {
  if (!hasStorage) return;
  try {
    await Promise.race([
      window.storage.set(key, JSON.stringify(value), true),
      new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 2500)),
    ]);
  } catch (e) {
    console.warn("Save failed for", key, e);
  }
}

function Metric({ label, value, sub, color, big }) {
  return (
    <div style={{
      background: "#1c1917",
      border: "1px solid #292524",
      borderRadius: 10,
      padding: 16,
      borderLeft: `3px solid ${color}`,

      <div style={{ fontFamily: "ui-monospace, monospace", fontSize: big ? 28 : 22, fontWeight: 700, color: "#fafaf9", letterSpacing: "-0.02em" }}>{value}</div>
      <div style={{ fontSize: 11, color: "#78716c", marginTop: 6 }}>{sub}</div>
    </div>
  );
}

              <PLine label="Roof + HVAC concession to buyer" value={-concessions} />
            )}
            <div style={{ height: 1, background: "#292524", margin: "6px 0" }} />
            <PLine label="NET TO YOU AT CLOSE" value={net} bold huge />
          </div>
        </Card>

        <Card title="Scenario Modeling" style={{ marginTop: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <Field label="Scenario sale price">
              <input type="number" value={deal.scenarioPrice} onChange={(e) => updateDeal({ scenarioPrice: parseFloat(e.target.value) || 0 })}
                style={inputStyle} />
            </Field>
            <Field label="Buyer agent %">
              <input type="number" step="0.5" value={deal.buyerAgentPct} onChange={(e) => updateDeal({ buyerAgentPct: parseFloat(e.target.value) || 0 })}
                style={inputStyle} />
            </Field>
            <Field label="Misc closing %">
              <input type="number" step="0.5" value={deal.closingMiscPct} onChange={(e) => updateDeal({ closingMiscPct: parseFloat(e.target.value) || 0 })}
                style={inputStyle} />
            </Field>
            <Field label="Flat fee MLS">
              <input type="number" value={deal.flatFee} onChange={(e) => updateDeal({ flatFee: parseFloat(e.target.value) || 0 })}
                style={inputStyle} />
            </Field>
          </div>
          <label style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 14, cursor: "pointer" }}>
            <input type="checkbox" checked={deal.scenarioConcession} onChange={(e) => updateDeal({ scenarioConcession: e.target.checked })} />
            <span style={{ fontSize: 13 }}>Include roof + HVAC concession ({fmt(deal.pendingConcessions.reduce((s, c) => s + c.amount, 0))})</span>
          </label>

          <div style={{ marginTop: 16, padding: 12, background: "#0c0a09", borderRadius: 6, border: "1px solid #292524" }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#d97706", letterSpacing: "0.1em", marginBottom: 8, textTransform: "uppercase" }}>Quick Scenarios</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <ScenarioBtn label="$255K as-is" onClick={() => updateDeal({ scenarioPrice: 255000, scenarioConcession: false })} active={deal.scenarioPrice === 255000 && !deal.scenarioConcession} />
              <ScenarioBtn label="$255K + concession" onClick={() => updateDeal({ scenarioPrice: 255000, scenarioConcession: true })} active={deal.scenarioPrice === 255000 && deal.scenarioConcession} />
              <ScenarioBtn label="$245K as-is" onClick={() => updateDeal({ scenarioPrice: 245000, scenarioConcession: false })} active={deal.scenarioPrice === 245000 && !deal.scenarioConcession} />
              <ScenarioBtn label="$245K + concession" onClick={() => updateDeal({ scenarioPrice: 245000, scenarioConcession: true })} active={deal.scenarioPrice === 245000 && deal.scenarioConcession} />
            </div>
          </div>
        </Card>
      </div>

      <div>
        <Card title="Pre-Launch Progress">
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 10 }}>
            <span style={{ fontFamily: "ui-monospace, monospace", fontSize: 32, fontWeight: 700 }}>{tasksDone}</span>
            <span style={{ fontSize: 14, color: "#a8a29e" }}>of {tasksTotal} tasks complete</span>
          </div>
          <div style={{ height: 8, background: "#0c0a09", borderRadius: 4, overflow: "hidden", border: "1px solid #292524" }}>
            <div style={{ height: "100%", width: `${(tasksDone / tasksTotal) * 100}%`, background: "linear-gradient(90deg, #d97706, #f59e0b)", transition: "width 0.3s" }} />
          </div>
        </Card>

        <Card title="Spend by Category" style={{ marginTop: 16 }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {cats.map(([cat, amt]) => (
              <div key={cat}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                  <span style={{ color: "#a8a29e" }}>{cat}</span>
                  <span style={{ fontFamily: "ui-monospace, monospace", fontWeight: 600 }}>{fmt(amt)}</span>
                </div>
                <div style={{ height: 4, background: "#0c0a09", borderRadius: 2, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(amt / maxCat) * 100}%`, background: "#d97706" }} />
                </div>
              </div>
            ))}
          </div>
        </Card>

        <Card title="Deal Quick Reference" style={{ marginTop: 16 }}>
          <Row k="Contract Price" v={fmt(deal.contractPrice)} />
          <Row k="Reinstatement Paid" v={fmt(deal.reinstatement)} />
          <Row k="Rocket Payoff (on deed)" v={fmtCents(deal.rocketPayoff)} />
          <Row k="Total to Clear at Close" v={fmt(deal.rocketPayoff + cashOOP)} />
        </Card>
      </div>
    </div>
  );
}

function PLine({ label, value, bold, huge, positive }) {
  const isNeg = value < 0;
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <span style={{ fontSize: huge ? 14 : 13, color: bold ? "#fafaf9" : "#a8a29e", fontWeight: bold ? 700 : 400 }}>{label}</span>
      <span style={{
        fontFamily: "ui-monospace, monospace",
        fontSize: huge ? 22 : 14,
        fontWeight: bold ? 700 : 500,
        color: huge ? (value >= 60000 ? "#10b981" : value >= 0 ? "#f59e0b" : "#ef4444") : isNeg ? "#fca5a5" : positive ? "#86efac" : "#fafaf9"
      }}>
        {isNeg ? "-" : ""}{fmt(Math.abs(value))}
      </span>
    </div>
  );
}

function ScenarioBtn({ label, onClick, active }) {
  return (
    <button onClick={onClick} style={{
      background: active ? "#d97706" : "#1c1917",
      color: active ? "#0c0a09" : "#fafaf9",
      border: active ? "1px solid #d97706" : "1px solid #44403c",
      padding: "8px 10px",
      borderRadius: 6,
      fontSize: 11,
      fontWeight: 600,
    }}>{label}</button>
  );
}

function Row({ k, v }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #292524", fontSize: 12 }}>
      <span style={{ color: "#a8a29e" }}>{k}</span>
      <span style={{ fontFamily: "ui-monospace, monospace", fontWeight: 600 }}>{v}</span>
    </div>
  );
}

function Expenses({ items, displayItems, setItems, logActivity, searchActive }) {
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ payee: "", amount: "", date: "", notes: "", category: "Other" });

  const list = displayItems || items;
  const total = list.reduce((s, x) => s + (parseFloat(x.amount) || 0), 0);
  const fullTotal = items.reduce((s, x) => s + (parseFloat(x.amount) || 0), 0);

  const addExpense = () => {
    if (!draft.payee || !draft.amount) return;
    const newItem = { ...draft, id: "e" + Date.now(), amount: parseFloat(draft.amount) };
    setItems([...items, newItem]);
    logActivity(`Added expense: ${draft.payee} ${fmt(draft.amount)}`);
    setDraft({ payee: "", amount: "", date: "", notes: "", category: "Other" });
    setAdding(false);
  };

  const deleteExpense = (id) => {
    const item = items.find(i => i.id === id);
    setItems(items.filter(i => i.id !== id));
    logActivity(`Deleted expense: ${item?.payee}`);
  };

  const titleText = searchActive
    ? `${list.length} of ${items.length} expenses match (${fmt(total)} of ${fmt(fullTotal)})`
    : `All Expenses (${items.length} items, ${fmt(fullTotal)} total)`;

  return (
    <Card title={titleText} action={
      <button onClick={() => setAdding(!adding)} style={btnPrimary}>{adding ? "Cancel" : "+ Add Expense"}</button>
    }>
      {adding && (
        <div style={{ padding: 14, background: "#0c0a09", borderRadius: 8, border: "1px solid #44403c", marginBottom: 14, display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Payee"><input value={draft.payee} onChange={(e) => setDraft({ ...draft, payee: e.target.value })} style={inputStyle} placeholder="Vendor name" /></Field>
          <Field label="Amount"><input type="number" value={draft.amount} onChange={(e) => setDraft({ ...draft, amount: e.target.value })} style={inputStyle} placeholder="0" /></Field>
          <Field label="Date"><input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} style={inputStyle} /></Field>
          <Field label="Category">
            <select value={draft.category} onChange={(e) => setDraft({ ...draft, category: e.target.value })} style={inputStyle}>
              {["Acquisition", "Inspection", "Plumbing", "Electrical", "Well/Septic", "Cleanup", "Labor", "Holding", "Marketing", "Setup", "Site", "Other"].map(c => <option key={c}>{c}</option>)}
            </select>
          </Field>
          <button onClick={addExpense} style={{ ...btnPrimary, padding: "8px 14px" }}>Save</button>
          <Field label="Notes" style={{ gridColumn: "1 / -1" }}><input value={draft.notes} onChange={(e) => setDraft({ ...draft, notes: e.target.value })} style={inputStyle} placeholder="Optional details" /></Field>
        </div>
      )}

      <div className="scroll" style={{ maxHeight: 600, overflowY: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead style={{ position: "sticky", top: 0, background: "#1c1917" }}>
            <tr style={{ borderBottom: "1px solid #44403c" }}>
              <th style={th}>Payee</th>
              <th style={{ ...th, textAlign: "right" }}>Amount</th>
              <th style={th}>Date</th>
              <th style={th}>Category</th>
              <th style={th}>Notes</th>
              <th style={th}></th>
            </tr>
          </thead>
          <tbody>
            {[...list].sort((a, b) => (b.date || "").localeCompare(a.date || "")).map(item => (
              <tr key={item.id} style={{ borderBottom: "1px solid #292524" }}>
                <td style={td}>{item.payee}</td>
                <td style={{ ...td, textAlign: "right", fontFamily: "ui-monospace, monospace", fontWeight: 600, color: "#fca5a5" }}>{fmt(item.amount)}</td>
                <td style={{ ...td, color: "#a8a29e", fontFamily: "ui-monospace, monospace", fontSize: 11 }}>{item.date || "—"}</td>
                <td style={td}><span style={{ padding: "2px 8px", background: "#292524", borderRadius: 4, fontSize: 10, fontWeight: 600, color: "#d97706" }}>{item.category}</span></td>
                <td style={{ ...td, color: "#a8a29e", fontSize: 11 }}>{item.notes}</td>
                <td style={td}><button onClick={() => deleteExpense(item.id)} style={btnGhost}>×</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

function Tasks({ items, displayItems, setItems, logActivity, searchActive }) {
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ label: "", due: "", owner: "Nathan", priority: "med" });

  const list = displayItems || items;

  const toggle = (id) => {
    const item = items.find(i => i.id === id);
    const updated = items.map(t => t.id === id ? { ...t, done: !t.done } : t);
    setItems(updated);
    logActivity(`${!item.done ? "Completed" : "Reopened"}: ${item.label}`);
  };

  const addTask = () => {
    if (!draft.label) return;
    setItems([...items, { ...draft, id: "t" + Date.now(), done: false }]);
    logActivity(`Added task: ${draft.label}`);
    setDraft({ label: "", due: "", owner: "Nathan", priority: "med" });
    setAdding(false);
  };

  const deleteTask = (id) => {
    const item = items.find(i => i.id === id);
    setItems(items.filter(i => i.id !== id));
    logActivity(`Deleted task: ${item?.label}`);
  };

  const sorted = [...list].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const pri = { high: 0, med: 1, low: 2 };
    return (pri[a.priority] || 1) - (pri[b.priority] || 1);
  });

  const titleText = searchActive
    ? `${list.length} of ${items.length} tasks match`
    : `Tasks (${items.filter(t => !t.done).length} open)`;

  return (
    <Card title={titleText} action={
      <button onClick={() => setAdding(!adding)} style={btnPrimary}>{adding ? "Cancel" : "+ Add Task"}</button>
    }>
      {adding && (
        <div style={{ padding: 14, background: "#0c0a09", borderRadius: 8, border: "1px solid #44403c", marginBottom: 14, display: "grid", gridTemplateColumns: "3fr 1fr 1fr 1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Task"><input value={draft.label} onChange={(e) => setDraft({ ...draft, label: e.target.value })} style={inputStyle} placeholder="What needs done?" /></Field>
          <Field label="Due"><input type="date" value={draft.due} onChange={(e) => setDraft({ ...draft, due: e.target.value })} style={inputStyle} /></Field>
          <Field label="Owner">
            <select value={draft.owner} onChange={(e) => setDraft({ ...draft, owner: e.target.value })} style={inputStyle}>
              <option>Nathan</option><option>Justin</option><option>Mary</option><option>William</option>
            </select>
          </Field>
          <Field label="Priority">
            <select value={draft.priority} onChange={(e) => setDraft({ ...draft, priority: e.target.value })} style={inputStyle}>
              <option value="high">High</option><option value="med">Med</option><option value="low">Low</option>
            </select>
          </Field>
          <button onClick={addTask} style={{ ...btnPrimary, padding: "8px 14px" }}>Save</button>
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {sorted.map(t => (
          <div key={t.id} style={{
            display: "flex", alignItems: "center", gap: 12,
            padding: "10px 12px",
            background: t.done ? "#0c0a09" : "#1c1917",
            border: `1px solid ${t.done ? "#1c1917" : "#292524"}`,
            borderRadius: 8,
            opacity: t.done ? 0.5 : 1,
          }}>
            <input type="checkbox" checked={t.done} onChange={() => toggle(t.id)} style={{ width: 18, height: 18, cursor: "pointer" }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 500, textDecoration: t.done ? "line-through" : "none" }}>{t.label}</div>
              <div style={{ fontSize: 11, color: "#78716c", marginTop: 2, display: "flex", gap: 10 }}>
                <span>{t.owner}</span>
                {t.due && <span>· Due {t.due}</span>}
              </div>
            </div>
            <span style={{
              padding: "2px 8px", borderRadius: 4, fontSize: 10, fontWeight: 700,
              background: t.priority === "high" ? "#7f1d1d" : t.priority === "med" ? "#78350f" : "#1c1917",
              color: t.priority === "high" ? "#fca5a5" : t.priority === "med" ? "#fbbf24" : "#a8a29e",
            }}>{t.priority.toUpperCase()}</span>
            <button onClick={() => deleteTask(t.id)} style={btnGhost}>×</button>
          </div>
        ))}
      </div>
    </Card>
  );
}

function Vendors({ items, displayItems, setItems, logActivity, searchActive }) {
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ name: "", role: "", phone: "", status: "Active", notes: "" });

  const list = displayItems || items;

  const addVendor = () => {
    if (!draft.name) return;
    setItems([...items, { ...draft, id: "v" + Date.now() }]);
    logActivity(`Added vendor: ${draft.name}`);
    setDraft({ name: "", role: "", phone: "", status: "Active", notes: "" });
    setAdding(false);
  };

  const deleteVendor = (id) => {
    const item = items.find(i => i.id === id);
    setItems(items.filter(i => i.id !== id));
    logActivity(`Removed vendor: ${item?.name}`);
  };

  const statusColor = (s) => ({
    "Complete": "#10b981",
    "Active": "#f59e0b",
    "Pending": "#3b82f6",
    "Quoted": "#a78bfa",
  })[s] || "#a8a29e";

  const titleText = searchActive
    ? `${list.length} of ${items.length} vendors match`
    : `Vendors & Contacts (${items.length})`;

  return (
    <Card title={titleText} action={
      <button onClick={() => setAdding(!adding)} style={btnPrimary}>{adding ? "Cancel" : "+ Add Vendor"}</button>
    }>
      {adding && (
        <div style={{ padding: 14, background: "#0c0a09", borderRadius: 8, border: "1px solid #44403c", marginBottom: 14, display: "grid", gridTemplateColumns: "1.5fr 1.5fr 1fr 1fr 2fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Name"><input value={draft.name} onChange={(e) => setDraft({ ...draft, name: e.target.value })} style={inputStyle} placeholder="Vendor" /></Field>
          <Field label="Role"><input value={draft.role} onChange={(e) => setDraft({ ...draft, role: e.target.value })} style={inputStyle} placeholder="What they do" /></Field>
          <Field label="Phone"><input value={draft.phone} onChange={(e) => setDraft({ ...draft, phone: e.target.value })} style={inputStyle} placeholder="555-1234" /></Field>
          <Field label="Status">
            <select value={draft.status} onChange={(e) => setDraft({ ...draft, status: e.target.value })} style={inputStyle}>
              <option>Active</option><option>Complete</option><option>Pending</option><option>Quoted</option>
            </select>
          </Field>
          <Field label="Notes"><input value={draft.notes} onChange={(e) => setDraft({ ...draft, notes: e.target.value })} style={inputStyle} /></Field>
          <button onClick={addVendor} style={{ ...btnPrimary, padding: "8px 14px" }}>Save</button>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 12 }}>
        {list.map(v => (
          <div key={v.id} style={{ background: "#0c0a09", border: "1px solid #292524", borderRadius: 8, padding: 14, position: "relative" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700 }}>{v.name}</div>
                <div style={{ fontSize: 11, color: "#a8a29e", marginTop: 2 }}>{v.role}</div>
              </div>
              <span style={{ padding: "2px 8px", borderRadius: 4, fontSize: 9, fontWeight: 700, background: `${statusColor(v.status)}22`, color: statusColor(v.status), letterSpacing: "0.05em" }}>{v.status.toUpperCase()}</span>
            </div>
            {v.phone && <div style={{ fontSize: 12, color: "#d97706", fontFamily: "ui-monospace, monospace", marginTop: 6 }}>{v.phone}</div>}
            {v.notes && <div style={{ fontSize: 11, color: "#a8a29e", marginTop: 8, lineHeight: 1.5 }}>{v.notes}</div>}
            <button onClick={() => deleteVendor(v.id)} style={{ ...btnGhost, position: "absolute", top: 8, right: 8 }}>×</button>
          </div>
        ))}
      </div>
    </Card>
  );
}

function Notes({ value, setValue, searchQuery }) {
  const matchCount = searchQuery
    ? (value.toLowerCase().match(new RegExp(searchQuery.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "g")) || []).length
    : 0;

  return (
    <Card title="Shared Notes (markdown)">
      {searchQuery && (
        <div style={{ padding: "10px 14px", marginBottom: 12, background: matchCount > 0 ? "#1e3a1e" : "#1c1917", border: `1px solid ${matchCount > 0 ? "#10b981" : "#44403c"}`, borderRadius: 6, fontSize: 12, color: matchCount > 0 ? "#86efac" : "#a8a29e" }}>
          {matchCount > 0
            ? `${matchCount} occurrence${matchCount !== 1 ? "s" : ""} of "${searchQuery}" in notes — use Ctrl/Cmd+F inside the textarea to jump to them`
            : `No matches for "${searchQuery}" in notes`}
        </div>
      )}
      <textarea
        value={value}
        onChange={(e) => setValue(e.target.value)}
        style={{
          width: "100%",
          minHeight: 500,
          background: "#0c0a09",
          border: "1px solid #292524",
          borderRadius: 8,
          color: "#fafaf9",
          padding: 14,
          fontSize: 13,
          fontFamily: "ui-monospace, monospace",
          lineHeight: 1.6,
          resize: "vertical",
        }}
      />
      <div style={{ fontSize: 11, color: "#78716c", marginTop: 8 }}>Auto-saves on every keystroke.</div>
    </Card>
  );
}

function Activity({ items, searchActive }) {
  return (
    <Card title={searchActive ? `Activity (${items.length} matching)` : "Recent Activity"}>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {items.length === 0 && <div style={{ color: "#78716c", fontSize: 13 }}>No activity yet. Make changes in other tabs and they'll show up here.</div>}
        {items.map((a, i) => (
          <div key={i} style={{ padding: "10px 12px", background: "#0c0a09", border: "1px solid #292524", borderRadius: 6, display: "flex", gap: 12, alignItems: "center" }}>
            <span style={{ padding: "2px 8px", background: a.who === "Nathan" ? "#7c2d12" : a.who === "Justin" ? "#1e3a8a" : "#292524", color: "#fafaf9", borderRadius: 4, fontSize: 10, fontWeight: 700, minWidth: 55, textAlign: "center" }}>{a.who}</span>
            <span style={{ flex: 1, fontSize: 13 }}>{a.msg}</span>
            <span style={{ fontSize: 10, color: "#78716c", fontFamily: "ui-monospace, monospace" }}>{new Date(a.ts).toLocaleString()}</span>
          </div>
        ))}
      </div>
    </Card>
  );
}

function Card({ title, children, action, style }) {
  return (
    <div style={{ background: "#1c1917", border: "1px solid #292524", borderRadius: 10, padding: 18, ...style }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#fafaf9", letterSpacing: "0.05em", textTransform: "uppercase" }}>{title}</div>
        {action}
      </div>
      {children}
    </div>
  );
}

function Field({ label, children, style }) {
  return (
    <div style={style}>
      <div style={{ fontSize: 10, fontWeight: 600, color: "#a8a29e", letterSpacing: "0.1em", marginBottom: 4, textTransform: "uppercase" }}>{label}</div>
      {children}
    </div>
  );
}

const inputStyle = {
  width: "100%",
  background: "#1c1917",
  border: "1px solid #44403c",
  color: "#fafaf9",
  padding: "8px 10px",
  borderRadius: 6,
  fontSize: 13,
  outline: "none",
};

const btnPrimary = {
  background: "#d97706",
  color: "#0c0a09",
  border: "none",
  padding: "7px 12px",
  borderRadius: 6,
  fontSize: 12,
  fontWeight: 700,
};

const btnGhost = {
  background: "transparent",
  color: "#78716c",
  border: "1px solid #44403c",
  padding: "4px 10px",
  borderRadius: 4,
  fontSize: 14,
  fontWeight: 600,
};

const th = { textAlign: "left", padding: "10px 12px", fontSize: 10, fontWeight: 700, color: "#a8a29e", letterSpacing: "0.1em", textTransform: "uppercase" };
const td = { padding: "10px 12px", verticalAlign: "top" };

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FlipCommandCenter />);
</script>
