<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
<title>Deal Command Center · RefundLocators</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0b1f3a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DCC" />
<link rel="apple-touch-icon" href="icon-dcc.svg" />
<link rel="icon" type="image/svg+xml" href="icon-dcc.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html, body { margin: 0; padding: 0; background: #0c0a09; color: #fafaf9; font-family: 'DM Sans', system-ui, -apple-system, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }
  ::placeholder { color: #57534e; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #44403c; border-radius: 3px; }
  @keyframes dotPulse { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }

  /* ─── Touch + Tap fundamentals ─────────────────────────────── */
  button, a, [role="button"] { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  input, textarea, select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }

  /* ─── FAB (Floating Action Button) — mobile only ───────────── */
  .fab { display: none; position: fixed; right: calc(16px + env(safe-area-inset-right));
         bottom: calc(20px + env(safe-area-inset-bottom)); width: 56px; height: 56px;
         border-radius: 50%; background: #d97706; color: #0c0a09; border: none;
         box-shadow: 0 6px 18px rgba(217, 119, 6, 0.45), 0 2px 4px rgba(0, 0, 0, 0.3);
         font-size: 26px; font-weight: 700; cursor: pointer; z-index: 90;
         align-items: center; justify-content: center; line-height: 1; }
  .fab:active { transform: scale(0.94); }

  /* ─── Bottom tab bar — mobile only, LeadConnector-style ─────── */
  .bottom-nav { display: none; position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(12, 10, 9, 0.96); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid #292524;
    padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index: 100; }
  .bottom-nav-inner { display: flex; justify-content: space-around; align-items: stretch; max-width: 540px; margin: 0 auto; }
  .bottom-nav button { flex: 1; background: transparent; border: none;
    color: #78716c; padding: 6px 4px; font-size: 10px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; font-family: inherit; min-height: 48px; position: relative;
    transition: color 0.12s; letter-spacing: 0.02em; }
  .bottom-nav button .nav-icon { font-size: 20px; line-height: 1; }
  .bottom-nav button.active { color: #d97706; }
  .bottom-nav button .nav-badge { position: absolute; top: 4px; right: 50%;
    transform: translateX(14px); background: #ef4444; color: #fff;
    border-radius: 10px; padding: 1px 5px; font-size: 9px; font-weight: 700;
    min-width: 16px; text-align: center; }

  /* ─── Tablet (≤768px) ──────────────────────────────────────── */
  @media (max-width: 768px) {
    .portfolio-stats { grid-template-columns: 1fr 1fr !important; }
    .deal-grid { grid-template-columns: 1fr !important; }
    .main-grid { grid-template-columns: 1fr !important; }
    .kanban-board { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .kanban-columns { min-width: 600px; }
    .detail-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .detail-tabs::-webkit-scrollbar { display: none; }
    .detail-tabs button { padding: 10px 12px !important; font-size: 13px !important; white-space: nowrap; }
    .expense-add-form { grid-template-columns: 1fr !important; }
    .metric-grid-4 { grid-template-columns: 1fr 1fr !important; }
    .metric-grid-3 { grid-template-columns: 1fr !important; }
    .overview-grid { grid-template-columns: 1fr !important; }
    .header-bar { flex-direction: column; align-items: flex-start !important; gap: 12px !important; }
    .header-right { align-self: stretch; flex-wrap: wrap; }
    .view-controls { flex-direction: column; align-items: stretch !important; gap: 10px !important; }
  }

  /* ─── Phone (≤640px) ───────────────────────────────────────── */
  @media (max-width: 640px) {
    /* Library modal three-pane collapses to single column on phone */
    .library-panes { grid-template-columns: 1fr !important; }
    .library-panes > div { max-height: 280px !important; }

    /* Shell padding — tighter on phones, safe-area aware */
    .shell { padding: 12px 12px calc(80px + env(safe-area-inset-bottom)) !important; }

    /* Prevent iOS auto-zoom by ensuring inputs are ≥ 16px */
    input, textarea, select { font-size: 16px !important; }

    /* Tap targets: base ghost buttons get a proper minimum hit size */
    .tap-target, .header-right button { min-height: 38px; padding: 8px 12px !important; }

    /* Header: brand row wraps inputs down to own line */
    .portfolio-stats { grid-template-columns: 1fr !important; gap: 10px !important; }
    .portfolio-stat-card { padding: 14px !important; }

    /* Portfolio metric labels smaller but more readable */
    .portfolio-stat-label { font-size: 10px !important; }
    .portfolio-stat-value { font-size: 22px !important; }

    /* Titles — avoid massive desktop-scale headings */
    .page-title { font-size: 26px !important; }
    .page-kicker { font-size: 10px !important; }

    /* Modal → full-screen bottom-sheet on phone */
    .modal-backdrop { padding: 0 !important; align-items: flex-end !important; }
    .modal-inner {
      max-width: 100% !important;
      width: 100% !important;
      max-height: 92vh !important;
      padding: 18px 16px calc(18px + env(safe-area-inset-bottom)) !important;
      margin: 0 !important;
      border-radius: 16px 16px 0 0 !important;
      border-bottom: 0 !important;
      animation: sheetUp 0.18s ease-out;
    }
    @keyframes sheetUp { from { transform: translateY(40px); opacity: 0.7; } to { transform: translateY(0); opacity: 1; } }

    /* Show FAB on phone (shifted up to clear the bottom nav) */
    .fab { display: inline-flex; bottom: calc(92px + env(safe-area-inset-bottom)) !important; }

    /* Hide Lauren's desktop floating pill on mobile — she lives in the
       More sheet instead so she doesn't crowd the bottom nav. */
    .lauren-fab { display: none !important; }
    /* ─── Comms: mobile-first rebuild ─────────────────────────────
       Goal: iMessage-/LeadConnector-feel. Container takes the viewport
       (minus the deal-detail chrome above it), composer is sticky at
       the bottom (keyboard-safe via env(safe-area-inset-bottom)),
       upper chrome compacts so the thread has real estate. */
    .comms-container {
      height: calc(100dvh - 280px) !important;
      min-height: 440px !important;
      border-radius: 8px !important;
      /* Keyboard-safe: when iOS opens the keyboard, visualViewport shrinks
         and we set --keyboard-offset. The container shrinks by that amount
         so the composer stays docked just above the keyboard's top edge. */
      height: calc(100dvh - 280px - var(--keyboard-offset, 0px)) !important;
      transition: height 0.18s ease;
    }
    .comms-container .contact-tab-btn {
      padding: 7px 11px !important;
      min-width: 68px !important;
      max-width: 110px !important;
    }
    .comms-container .thread-header {
      padding: 6px 12px !important;
    }
    .comms-container .thread-header-sub {
      font-size: 9px !important;
    }
    .comms-container .thread-header-from {
      /* Keep the number selector visible on mobile — Nathan needs to pick
         which line an outbound text goes from. Compact it to a single
         inline control so it doesn't stack in the header. */
      flex-direction: row !important;
      align-items: center !important;
      gap: 5px !important;
    }
    .comms-container .thread-header-from > span:first-child {
      font-size: 9px !important;  /* "FROM" kicker stays as a compact inline prefix */
    }
    .comms-container .thread-header-from select {
      font-size: 11px !important;
      padding: 2px 4px !important;
      max-width: 130px !important;
    }
    .comms-container .channel-chips {
      gap: 4px !important; padding: 6px 10px !important;
    }
    .comms-container .channel-chips button {
      padding: 3px 9px !important; font-size: 10px !important;
    }
    .comms-container .composer {
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom)) !important;
    }
    .comms-container .bubble {
      max-width: 82% !important;
    }

    /* When Lauren's panel IS opened on mobile, it goes full-screen bottom-sheet. */
    .lauren-panel {
      bottom: 0 !important; right: 0 !important; left: 0 !important;
      width: 100% !important; height: calc(100vh - 40px) !important;
      border-radius: 16px 16px 0 0 !important;
    }

    /* Show bottom-nav on phone + hide the redundant top view-controls */
    .bottom-nav { display: block; }
    .view-controls { display: none !important; }

    /* Push shell content up so bottom nav never covers content */
    .shell { padding-bottom: calc(88px + env(safe-area-inset-bottom)) !important; }

    /* Hide desktop "+ New Deal" button since FAB replaces it */
    .desktop-new-deal { display: none !important; }

    /* Detail tabs scroll horizontally with snap */
    .detail-tabs { scroll-snap-type: x mandatory; padding-bottom: 2px; }
    .detail-tabs button { scroll-snap-align: start; }

    /* Deal detail metric strip wraps to 2-up on phone */
    .metric-grid-4 { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
    .metric-card { padding: 12px 10px !important; }

    /* Kanban stays scrollable — tighten column width */
    .kanban-columns { min-width: 540px; }

    /* Activity log rows — more breathing room on phone */
    .activity-row { padding: 14px !important; }

    /* Search modal — full screen on phone */
    .search-modal-inner { max-width: 100% !important; max-height: 100vh !important; height: 100vh !important; border-radius: 0 !important; }
  }

  /* ─── Small phone (≤390px) — tighten further ──────────────── */
  @media (max-width: 390px) {
    .metric-grid-4 { grid-template-columns: 1fr !important; }
    .portfolio-stat-value { font-size: 20px !important; }
    .page-title { font-size: 22px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="app.js" defer></script>
</body>
</html>
