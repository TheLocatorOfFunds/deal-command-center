  },
];

function FaqItem({ q, a }) {
  const [open, setOpen] = useState(false);
  return (
    <div className={"faq-item" + (open ? " faq-open" : "")}>
      <button className="faq-question" onClick={() => setOpen(!open)} aria-expanded={open}>
        <span>{q}</span>
        <span className="faq-toggle">+</span>
      </button>
      {open && <div className="faq-answer">{a}</div>}
    </div>
  );
}

function App() {
  const [form, setForm] = useState({
    name: "", phone: "", email: "", address: "", county: "", case_number: "",
    lead_type: "surplus", notes: "",
  });
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState(null);

  const update = (k) => (e) => setForm({ ...form, [k]: e.target.value });

  const submit = async (e) => {
    e.preventDefault();
    setError(null);

    const payload = {
      name: form.name.trim(),
      phone: form.phone.trim() || null,
      email: form.email.trim().toLowerCase(),
      address: form.address.trim() || null,
      county: form.county || null,
      case_number: form.case_number.trim() || null,
      notes: form.notes.trim() || null,
      lead_type: form.lead_type || 'surplus',
      source: ATTRIBUTION.utm_source ? `${ATTRIBUTION.utm_source}-web` : 'refundlocators-web',
      user_agent: navigator.userAgent.slice(0, 500),
      metadata: {
        referrer: document.referrer || null,
        submitted_from: window.location.href,
        landing: window.location.host,
        intake_type: form.lead_type || 'surplus',
        ...ATTRIBUTION,
      },
    };

    if (!payload.name || !payload.email) {
      setError('Name and email are required.');
      return;
    }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(payload.email)) {
      setError('Please enter a valid email address.');
      return;
    }

    setSubmitting(true);
    const { error } = await sb.from('leads').insert(payload);
    setSubmitting(false);

    if (error) {
      setError('We had trouble saving your request — please try again or call Nathan directly at (513) 951-8855.');
      return;
    }
    setSubmitted(true);
    // Scroll to top so they see the confirmation
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {}
  };

            </p>
            <div className="success-meta">Reference: {new Date().toLocaleDateString()} · {form.email}</div>

            <div className="success-next">
              <h4>What happens next</h4>
              <ul className="success-next-list">
                <li>We pull the public court records for your case today.</li>
                <li>If there are surplus funds, we email you the exact amount and our written fee.</li>
                <li>You decide whether to retain us, file yourself (we'll show you how), or walk away. No pressure.</li>
              </ul>
            </div>

            <p className="success-body" style={{ fontSize: 14, color: 'var(--text-muted)', marginTop: 28 }}>

        </div>

            <div className="field">
              <label className="field-label">Your situation</label>
              <div className="situation-group" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

                  <input type="radio" name="lead_type" value="surplus" checked={form.lead_type === 'surplus'} onChange={update('lead_type')} style={{ marginTop: 3 }} />
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--navy)' }}>I lost a home at foreclosure</div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>Check for surplus funds the court may be holding in my name.</div>

                </label>
                <label style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '12px 14px', border: '1px solid ' + (form.lead_type === 'preforeclosure' ? 'var(--gold)' : 'var(--border-strong)'), borderRadius: 8, background: form.lead_type === 'preforeclosure' ? 'var(--bg-card-alt)' : 'transparent', cursor: 'pointer' }}>
                  <input type="radio" name="lead_type" value="preforeclosure" checked={form.lead_type === 'preforeclosure'} onChange={update('lead_type')} style={{ marginTop: 3 }} />
                  <div>

                  <input type="radio" name="lead_type" value="other" checked={form.lead_type === 'other'} onChange={update('lead_type')} style={{ marginTop: 3 }} />
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--navy)' }}>Something else</div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>Tell us in the notes below and we'll figure it out together.</div>
                  </div>
                </label>
              </div>
            </div>

            <div className="field-row">
              <div className="field">
                <label className="field-label">Your name</label>
                <input type="text" required value={form.name} onChange={update('name')} placeholder="First and last" autoComplete="name" />
              </div>
              <div className="field">
                <label className="field-label">Phone <span className="field-optional">(optional)</span></label>
                <input type="tel" value={form.phone} onChange={update('phone')} placeholder="(555) 555-5555" autoComplete="tel" />

            </div>

            <div className="field">
              <label className="field-label">Email</label>
              <input type="email" required value={form.email} onChange={update('email')} placeholder="you@email.com" autoComplete="email" />
            </div>

            <div className="field">
              <label className="field-label">Property address</label>
              <input type="text" value={form.address} onChange={update('address')} placeholder="123 Main St, Cincinnati, OH 45202" autoComplete="street-address" />
            </div>

            <div className="field-row">
              <div className="field">
                <label className="field-label">County <span className="field-optional">(Ohio)</span></label>
                <input list="counties" value={form.county} onChange={update('county')} placeholder="Start typing…" />
                <datalist id="counties">
                  {OHIO_COUNTIES.map(c => <option key={c} value={c} />)}
                </datalist>
              </div>
              <div className="field">
                <label className="field-label">Case number <span className="field-optional">(if you have it)</span></label>
                <input type="text" value={form.case_number} onChange={update('case_number')} placeholder="e.g. 2024-CV-12345" />
              </div>
            </div>

            {form.lead_type === 'other' && (
              <div className="field">
                <label className="field-label">Tell us more <span className="field-optional">(optional)</span></label>
                <textarea value={form.notes} onChange={update('notes')} placeholder="Describe your situation in a sentence or two and Nathan will reach out." rows={3} style={{ width: '100%', fontFamily: 'inherit', padding: 10, borderRadius: 8, border: '1px solid var(--border-strong)', background: 'var(--bg-input)', color: 'var(--navy)', fontSize: 14, resize: 'vertical' }} />
              </div>
            )}

            {error && <div className="error">{error}</div>}

            <button type="submit" className="submit" disabled={submitting || !form.name || !form.email}>
              {submitting ? 'Sending…' : form.lead_type === 'preforeclosure' ? 'Tell Nathan about my situation' : 'Check my property — free'}
            </button>

            <p className="privacy">

          <h2 className="about-title">I built RefundLocators because the surplus recovery industry is broken.</h2>
          <p className="about-body">
            I've watched Ohio families get cold-called two days after losing their home, pressured into signing 50% contracts before they even understood what surplus funds were, and then stuck with firms that stopped returning calls once the paperwork was filed.
          </p>
          <p className="about-body">
            That's not a business model. That's a scam with a license. We built RefundLocators to work the other direction — homeowners find us, we show them the math first, and nobody signs anything until they understand every dollar of the fee in writing.
          </p>
          <p className="about-body">
            If you want to file yourself, I'll coach you through it for free. If you want us to handle it, you'll know the exact cost before you decide.

          <div className="about-sig">— Nathan, Founder · RefundLocators</div>
