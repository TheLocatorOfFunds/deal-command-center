# Manual deploy of one or more Supabase Edge Functions.
#
# Why this exists:
#   `supabase functions deploy` is normally run from a developer's laptop.
#   That works fine for routine edits, but for voice infra it's nicer to
#   have a single Click-to-deploy button so anyone with repo access can
#   ship a function without installing the Supabase CLI locally.
#
# Trigger: workflow_dispatch only — no auto-deploy on push. Keeps deploys
# explicit + coordinated, matching the "no surprises in prod" convention
# in CLAUDE.md.
#
# Required secret: SUPABASE_PAT
#   - Personal Access Token from https://supabase.com/dashboard/account/tokens
#   - Same secret used by .github/workflows/migrations-applied.yml
#   - The Supabase CLI reads it from SUPABASE_ACCESS_TOKEN env var
#
# Usage:
#   1. GitHub → Actions → "Deploy Edge Functions" → "Run workflow"
#   2. Pick the branch (usually main, or a feature branch for testing)
#   3. Enter a space-separated list of function names, e.g.
#        lauren-voice twilio-voice-status vapi-webhook
#      Or leave blank to deploy all functions modified in the last commit.
#   4. Run — output streams to the action log.

name: Deploy Edge Functions

on:
  workflow_dispatch:
    inputs:
      functions:
        description: 'Space-separated list of function names (blank = changed in last commit)'
        required: false
        default: ''
      verify_jwt:
        description: 'Verify JWT? (almost always "no" — config.toml is the source of truth)'
        type: choice
        options: ['no', 'yes']
        default: 'no'

jobs:
  deploy:
    name: Deploy via Supabase CLI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to compute changed-functions list

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/
          supabase --version

      - name: Determine functions to deploy
        id: pick
        env:
          INPUT_FUNCTIONS: ${{ github.event.inputs.functions }}
        run: |
          if [ -n "$INPUT_FUNCTIONS" ]; then
            echo "list=$INPUT_FUNCTIONS" >> "$GITHUB_OUTPUT"
            echo "Deploying explicit list: $INPUT_FUNCTIONS"
          else
            # Compute set of function dirs touched by the most recent commit.
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/*/index.ts' \
              | awk -F/ '{print $3}' | sort -u | tr '\n' ' ')
            if [ -z "$CHANGED" ]; then
              echo "No function changes detected in HEAD~1..HEAD. Pass an explicit list via the 'functions' input."
              exit 1
            fi
            echo "list=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Auto-detected changed functions: $CHANGED"
          fi

      - name: Deploy each function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PAT }}
          PROJECT_REF: rcfaashkfpurkvtmsmeb
          VERIFY_JWT: ${{ github.event.inputs.verify_jwt }}
        run: |
          set -e
          FLAGS=""
          if [ "$VERIFY_JWT" = "no" ]; then
            FLAGS="--no-verify-jwt"
          fi
          for fn in ${{ steps.pick.outputs.list }}; do
            echo "::group::Deploy $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" $FLAGS
            echo "::endgroup::"
          done
          echo "All deploys complete."
