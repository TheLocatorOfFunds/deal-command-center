<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<link rel="icon" type="image/svg+xml" href="icon-attorney.svg" />

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1e8;
    --bg-card: #ffffff;
    --bg-card-alt: #ebe3d1;
    --navy: #0b1f3a;
    --navy-mid: #17355e;
    --navy-soft: #4a6fa5;
    --gold: #c9a24a;
    --gold-light: #d8b560;
    --gold-soft: #ede5cf;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-subtle: #9a9a9a;
    --border: #dcd3bc;
    --border-strong: #b9ad8e;
    --green: #2d7a4f;
    --green-soft: #e4f1e9;
    --red: #a83232;
    --shadow: 0 1px 2px rgba(11, 31, 58, 0.08), 0 8px 24px rgba(11, 31, 58, 0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .serif { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.01em; }
  .container { max-width: 920px; margin: 0 auto; padding: 20px 20px 60px; }
  .centered-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 22px; box-shadow: var(--shadow); }
  .card + .card { margin-top: 16px; }
  .card-title { font-size: 11px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin: 0 0 14px; }

  header.app-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .brand { display: flex; align-items: baseline; gap: 10px; font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px; color: var(--navy); letter-spacing: -0.015em; }
  .brand-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; display: inline-block; transform: translateY(-3px); }
  .brand-tag { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: var(--text-muted); text-transform: uppercase; }
  .user-meta { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-muted); }
  .btn-ghost { background: transparent; border: 1px solid var(--border-strong); color: var(--text-muted); padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.12s; }
  .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }

  h1.page-title { font-family: 'Fraunces', serif; font-weight: 500; font-size: 32px; color: var(--navy); margin: 0 0 4px; letter-spacing: -0.02em; }
  .page-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

  /* Inbox rows */
  .case-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 22px; box-shadow: var(--shadow); cursor: pointer; transition: all 0.12s; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .case-row + .case-row { margin-top: 12px; }
  .case-row:hover { border-color: var(--gold); transform: translateY(-1px); box-shadow: 0 2px 4px rgba(11, 31, 58, 0.1), 0 12px 30px rgba(11, 31, 58, 0.08); }
  .case-name { font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; color: var(--navy); margin-bottom: 4px; letter-spacing: -0.015em; line-height: 1.2; }
  .case-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
  .case-badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .case-right { text-align: right; font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

  /* Status badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .b-new-lead     { background: #fef3c7; color: #78350f; }
  .b-contacted    { background: #dbeafe; color: #1e40af; }
  .b-signed       { background: #e0e7ff; color: #4338ca; }
  .b-probate      { background: #fde68a; color: #713f12; }
  .b-filed        { background: #d1fae5; color: #065f46; }
  .b-awaiting-distribution { background: #fef3c7; color: #78350f; }
  .b-hearing-set  { background: #e0e7ff; color: #4338ca; }
  .b-recovered    { background: #d1fae5; color: #065f46; }
  .b-dead         { background: #fee2e2; color: #7f1d1d; }
  .b-default      { background: var(--gold-soft); color: var(--navy); }
  .b-muted        { background: var(--bg-card-alt); color: var(--text-muted); }

  /* Back link */
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--navy-mid); font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 16px; }
  .back-link:hover { color: var(--gold); }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
  @media (max-width: 720px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--bg-card-alt); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .stat-label { font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-family: 'Fraunces', serif; font-weight: 500; font-size: 16px; color: var(--navy); letter-spacing: -0.01em; line-height: 1.2; }

  /* Timeline */
  .timeline-item { display: grid; grid-template-columns: 12px 1fr auto; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: start; }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin-top: 7px; box-shadow: 0 0 0 4px rgba(201, 162, 74, 0.15); }
  .timeline-action { font-size: 13px; color: var(--text); }
  .timeline-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* Documents */
  .doc-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .doc-row:last-child { border-bottom: none; }
  .doc-icon { width: 36px; height: 36px; background: var(--gold-soft); color: var(--navy); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
  .doc-name { flex: 1; font-size: 13px; color: var(--navy); font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .doc-action { background: transparent; border: 1px solid var(--border-strong); color: var(--navy); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .doc-action:hover { background: var(--navy); color: #fffcf5; border-color: var(--navy); }

  /* Update form */
  .update-form { display: flex; flex-direction: column; gap: 10px; }
  .update-text { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg-card); resize: vertical; min-height: 80px; }
  .update-text:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(11, 31, 58, 0.1); }
  .btn-primary { background: var(--navy); color: #fffcf5; border: none; padding: 11px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.12s; align-self: flex-start; }
  .btn-primary:hover:not(:disabled) { background: var(--navy-mid); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-label { display: inline-flex; align-items: center; gap: 8px; background: var(--navy); color: #fffcf5; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .upload-label:hover { background: var(--navy-mid); }

  /* Sign-in */
  .signin-card { max-width: 440px; width: 100%; padding: 40px 32px; }
  .signin-card h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 26px; color: var(--navy); margin: 0 0 8px; letter-spacing: -0.015em; }
  .signin-card p.lead { color: var(--text-muted); font-size: 15px; margin: 0 0 24px; }
  input[type=email] { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: 8px; font-size: 15px; font-family: inherit; color: var(--text); background: var(--bg-card); }
  input[type=email]:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(11, 31, 58, 0.1); }
  .btn-full { width: 100%; background: var(--navy); color: #fffcf5; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 12px; }
  .btn-full:hover:not(:disabled) { background: var(--navy-mid); }
  .btn-full:disabled { opacity: 0.5; cursor: not-allowed; }
  .fineprint { color: var(--text-muted); font-size: 12px; margin-top: 18px; line-height: 1.55; }
  .success-check { display: flex; width: 56px; height: 56px; background: var(--green-soft); color: var(--green); border-radius: 50%; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 18px; }
  .error { color: var(--red); font-size: 13px; margin-top: 10px; padding: 10px 12px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; }
  .success { color: var(--green); font-size: 13px; margin-top: 10px; padding: 10px 12px; background: var(--green-soft); border: 1px solid #c3e6d1; border-radius: 6px; }
  .loader { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
  .empty { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 14px; }
  a { color: var(--navy-mid); }

  /* Touch + tap fundamentals */
  button, a, [role="button"] { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  input, textarea, select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }

  /* Sticky back-link on case detail so you can always exit quickly */
  .sticky-back { position: sticky; top: 0; z-index: 20; background: var(--bg); padding: 14px 0 10px; margin: -20px 0 10px; border-bottom: 1px solid var(--border); backdrop-filter: saturate(160%) blur(8px); -webkit-backdrop-filter: saturate(160%) blur(8px); background: rgba(245, 241, 232, 0.92); }

  @media (max-width: 600px) {
    .container { padding: 14px 14px calc(20px + env(safe-area-inset-bottom)); }
    .card { padding: 18px 16px; }
    h1.page-title { font-size: 24px; line-height: 1.15; }
    .page-sub { font-size: 13px; margin-bottom: 18px; }
    .case-row { padding: 16px; flex-direction: column; gap: 12px; }
    .case-right { text-align: left; }
    .case-name { font-size: 18px; }

    /* iOS zoom prevention + bigger tap targets */
    input, textarea, select { font-size: 16px !important; }
    .btn-ghost, .doc-action { min-height: 40px; padding: 10px 14px !important; font-size: 13px !important; }
    .btn-primary, .btn-full, .upload-label { min-height: 44px; padding: 12px 18px !important; font-size: 14px !important; }
    .badge { font-size: 11px; padding: 5px 11px; }
    .update-text { min-height: 100px; }

    /* Header brand-tag hides on narrow screens to keep title on one line */
    .brand-tag { display: none; }
    header.app-header { padding: 6px 0 14px; margin-bottom: 16px; }
    .user-meta { gap: 8px; font-size: 12px; }
    .user-meta > span { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Doc row wraps on tiny screens */
    .doc-row { flex-wrap: wrap; }
    .doc-action { margin-left: auto; }

    /* Sticky back consumes top safe area */
    .sticky-back { padding-top: calc(14px + env(safe-area-inset-top)); margin-top: calc(-14px - env(safe-area-inset-top)); }
  }

  @media (max-width: 380px) {
    .case-name { font-size: 16px; }
    h1.page-title { font-size: 22px; }
    .stat-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const SUPABASE_URL = 'https://rcfaashkfpurkvtmsmeb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_BjBJSBQC2iJXQodut3y3Ag_8aKyPmwv';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const fmtDate = (s) => {
  if (!s) return "—";
  const d = new Date(s); if (isNaN(d)) return "—";
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};
const daysSince = (s) => {
  if (!s) return null;
  const d = new Date(s); if (isNaN(d)) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
};
const statusLabel = (s) => (s || "").replace(/-/g, ' ').toUpperCase();
// Traffic-light staleness classifier for "days since last update"
const staleClass = (days) => {
  if (days == null) return 'muted';
  if (days < 3) return 'fresh';
  if (days < 7) return 'warn';
  return 'danger';
};
const staleColor = (cls) => ({
  fresh:  'var(--green)',
  warn:   '#a5731c',
  danger: 'var(--red)',
  muted:  'var(--text-muted)',
}[cls] || 'var(--text-muted)');

// Hash-based routing
function useRoute() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const onChange = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  const match = hash.match(/^#\/case\/([^/?#]+)/);
  if (match) return { page: 'case', dealId: decodeURIComponent(match[1]) };
  return { page: 'inbox' };
}
const navigate = (hash) => { window.location.hash = hash; };

// ─── App root ─────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setChecking(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  if (checking) return <div className="loader">Loading…</div>;
  if (!session) return <SignIn />;
  return <Authenticated session={session} />;
}

// ─── Sign-in ───────────────────────────────────────────
function SignIn() {
  const [email, setEmail] = useState("");
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [error, setError] = useState(null);

  const send = async () => {
    setError(null); setSending(true);
    const { error } = await sb.auth.signInWithOtp({
      email: email.trim().toLowerCase(),
      options: { emailRedirectTo: window.location.href.split('#')[0] },
    });
    setSending(false);
    if (error) setError(error.message); else setSent(true);
  };

  return (
    <div className="centered-shell">
      <div className="card signin-card">
        <div className="brand" style={{ marginBottom: 20 }}>
          <span className="brand-dot"></span>
          RefundLocators
          <span className="brand-tag">Counsel Portal</span>
        </div>
        {sent ? (
          <div>
            <div className="success-check">✓</div>
            <h1 className="serif">Check your email</h1>
            <p className="lead">We sent a secure sign-in link to <b>{email}</b>.</p>
            <p className="fineprint">The link is good for one hour and can only be used once. If you don't see the email, check your spam folder or contact Nathan at <a href="tel:+15135162306">(513) 516-2306</a>.</p>
          </div>
        ) : (
          <div>
            <h1>Counsel sign-in</h1>
            <p className="lead">Sign in to view the cases RefundLocators has retained you on.</p>
            <input
              type="email" value={email} autoFocus
              onChange={e => setEmail(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && email) send(); }}
              placeholder="you@yourfirm.com"
            />
            <button className="btn-full" onClick={send} disabled={!email || sending}>
              {sending ? "Sending…" : "Email me a sign-in link"}
            </button>
            {error && <div className="error">{error}</div>}
            <p className="fineprint">
              Access is by invitation only. Use the email address Nathan provided when setting up your case assignment. If you believe you should have access but can't sign in, call <a href="tel:+15135162306">(513) 516-2306</a>.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Authenticated wrapper ────────────────────────────
function Authenticated({ session }) {
  const [profile, setProfile] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    sb.from('profiles').select('*').eq('id', session.user.id).single().then(({ data }) => {
      setProfile(data || { name: session.user.email.split('@')[0], role: null });
    });
    sb.rpc('attorney_mark_seen');
  }, [session]);

  if (!profile) return <div className="loader">Loading profile…</div>;

  const isAttorney = profile.role === 'attorney';
  const isAdminPreview = profile.role === 'admin' || profile.role === 'user' || profile.role === 'va';

  if (!isAttorney && !isAdminPreview) {
    return (
      <div className="centered-shell">
        <div className="card signin-card">
          <div className="brand" style={{ marginBottom: 20 }}>
            <span className="brand-dot"></span>
            RefundLocators
            <span className="brand-tag">Counsel Portal</span>
          </div>
          <h1 className="serif">Wrong portal</h1>
          <p className="lead">You're signed in as <b>{session.user.email}</b>, but this portal is only for attorneys retained by RefundLocators.</p>
          <p className="fineprint">
            If you're a client, please use <a href="portal.html">the client portal</a> instead.<br/><br/>
            If you're a team member, go to <a href="/deal-command-center/">DCC</a>.<br/><br/>
            If you believe this is an error, call Nathan at <a href="tel:+15135162306">(513) 516-2306</a>.
          </p>
          <button className="btn-full" onClick={() => sb.auth.signOut()} style={{ marginTop: 20 }}>
            Sign out
          </button>
        </div>
      </div>
    );
  }

  return <Portal session={session} profile={profile} isPreview={isAdminPreview} />;
}

// ─── Admin preview banner ─────────────────────────────
function PreviewBanner({ role }) {
  return (
    <div style={{
      background: '#0b1f3a',
      color: '#fffcf5',
      padding: 'calc(10px + env(safe-area-inset-top)) 14px 10px',
      position: 'sticky',
      top: 0,
      zIndex: 50,
      display: 'flex',
      alignItems: 'center',
      gap: 10,
      flexWrap: 'wrap',
      fontSize: 13,
      boxShadow: '0 2px 12px rgba(11, 31, 58, 0.2)',
      justifyContent: 'space-between',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
        <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.12em', padding: '3px 8px', background: '#c9a24a', color: '#0b1f3a', borderRadius: 4, whiteSpace: 'nowrap' }}>ADMIN PREVIEW</span>
        <span style={{ opacity: 0.9, whiteSpace: 'nowrap' }}>Viewing as <b>{role}</b> · reads all cases</span>
      </div>
      <a href="/deal-command-center/" style={{ color: '#d8b560', textDecoration: 'none', fontWeight: 600, whiteSpace: 'nowrap', fontSize: 13 }}>← DCC</a>
    </div>
  );
}

// ─── Portal shell (header + router) ───────────────────
function Portal({ session, profile, isPreview }) {
  const route = useRoute();
  return (
    <>
      {isPreview && <PreviewBanner role="Counsel" />}
      <div className="container">
        <header className="app-header">
          <div className="brand">
            <span className="brand-dot"></span>
            RefundLocators
            <span className="brand-tag">Counsel Portal</span>
          </div>
          <div className="user-meta">
            <span>{profile.name}</span>
            <button className="btn-ghost" onClick={() => sb.auth.signOut()}>Sign out</button>
          </div>
        </header>
        {route.page === 'case'
          ? <CaseDetail dealId={route.dealId} session={session} profile={profile} isPreview={isPreview} />
          : <Inbox isPreview={isPreview} />}
      </div>
    </>
  );
}

// ─── Inbox: dashboard of assigned cases ────────────────
// Loads assigned deals + recent activity / docket / messages to compute
// per-case "last update" (color-coded) and live docket badges. Also shows
// a combined Recent Docket Activity feed across every case at the bottom.
function Inbox({ isPreview }) {
  const [cases, setCases] = useState(null);
  const [recentDocket, setRecentDocket] = useState([]);
  const [error, setError] = useState(null);

  const load = async () => {
    let deals = [];
    let seenMap = {};
    try {
      if (isPreview) {
        const { data, error } = await sb.from('deals').select('*').order('updated_at', { ascending: false });
        if (error) throw error;
        deals = data || [];
      } else {
        const { data: u } = await sb.auth.getUser();
        if (!u?.user) { setError('Not signed in'); return; }
        const { data: a, error: aErr } = await sb
          .from('attorney_assignments')
          .select('deal_id, last_seen_at')
          .eq('user_id', u.user.id)
          .eq('enabled', true);
        if (aErr) throw aErr;
        if (!a || a.length === 0) { setCases([]); setRecentDocket([]); return; }
        seenMap = Object.fromEntries(a.map(x => [x.deal_id, x.last_seen_at]));
        const ids = a.map(x => x.deal_id);
        const { data: d, error: dErr } = await sb.from('deals').select('*').in('id', ids);
        if (dErr) throw dErr;
        deals = d || [];
      }

      const ids = deals.map(d => d.id);
      if (ids.length === 0) { setCases([]); setRecentDocket([]); return; }

      const since30 = new Date(Date.now() - 30 * 86400000).toISOString();
      const [actRes, dockRes, msgRes] = await Promise.all([
        sb.from('activity').select('deal_id, created_at').in('deal_id', ids).gte('created_at', since30),
        sb.from('docket_events').select('*').in('deal_id', ids).order('event_date', { ascending: false }).limit(200),
        sb.from('messages').select('deal_id, created_at').in('deal_id', ids).gte('created_at', since30),
      ]);

      // Per-deal aggregates: latest timestamp + docket counts
      const byDeal = {};
      for (const d of deals) {
        byDeal[d.id] = {
          deal: d,
          last: d.updated_at ? new Date(d.updated_at) : new Date(0),
          docket7d: 0,
          docketUnread: 0,
        };
      }
      const sevenDaysAgo = new Date(Date.now() - 7 * 86400000);

      for (const row of (actRes.data || [])) {
        const b = byDeal[row.deal_id]; if (!b) continue;
        const t = new Date(row.created_at);
        if (t > b.last) b.last = t;
      }
      for (const row of (msgRes.data || [])) {
        const b = byDeal[row.deal_id]; if (!b) continue;
        const t = new Date(row.created_at);
        if (t > b.last) b.last = t;
      }
      for (const ev of (dockRes.data || [])) {
        const b = byDeal[ev.deal_id]; if (!b) continue;
        const evDate = new Date(ev.event_date || ev.created_at);
        if (evDate > b.last) b.last = evDate;
        // Skip backfill rows from live-activity counts: they're historical
        // replays imported in one go, not fresh events worth badging. They
        // still render in the per-case Docket tab on demand.
        if (ev.is_backfill) continue;
        if (evDate > sevenDaysAgo) b.docket7d++;
        const lastSeen = seenMap[ev.deal_id] ? new Date(seenMap[ev.deal_id]) : null;
        if (lastSeen && ev.created_at && new Date(ev.created_at) > lastSeen) b.docketUnread++;
      }

      const enriched = Object.values(byDeal).map(b => ({
        ...b.deal,
        _lastActivity: b.last.getTime() > 0 ? b.last.toISOString() : null,
        _docket7d: b.docket7d,
        _docketUnread: b.docketUnread,
      })).sort((a, b) => new Date(b._lastActivity || 0) - new Date(a._lastActivity || 0));

      setCases(enriched);

      // Combined recent docket feed — latest 15 LIVE events across all
      // cases. Backfill/historical events are excluded so Jeff's "what's
      // new" stream doesn't get polluted with 12 months of replayed docket.
      const feed = (dockRes.data || [])
        .filter(ev => !ev.is_backfill)
        .slice(0, 15)
        .map(ev => ({
          ...ev,
          _dealName: byDeal[ev.deal_id]?.deal?.name || ev.deal_id,
        }));
      setRecentDocket(feed);
    } catch (e) {
      setError(e.message || String(e));
    }
  };

  useEffect(() => { load(); /* eslint-disable-next-line */ }, [isPreview]);

  // Live updates: refresh the whole inbox if anything relevant to these
  // cases changes on the server. Cheap because the refresh only hits
  // ~4 queries and typically <20 cases.
  useEffect(() => {
    const ch = sb.channel('attorney-inbox-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'docket_events' }, load)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'activity' }, load)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, load)
      .subscribe();
    return () => { sb.removeChannel(ch); };
    // eslint-disable-next-line
  }, [isPreview]);

  if (error) return <div className="error">{error}</div>;
  if (cases === null) return <div className="loader">Loading your cases…</div>;

  const active = cases.filter(c => !['closed', 'recovered', 'dead'].includes(c.status));
  const closed = cases.filter(c => ['closed', 'recovered', 'dead'].includes(c.status));
  const totalDocket7d = cases.reduce((s, c) => s + (c._docket7d || 0), 0);
  const totalDocketUnread = cases.reduce((s, c) => s + (c._docketUnread || 0), 0);
  const staleCount = active.filter(c => {
    const d = c._lastActivity ? daysSince(c._lastActivity) : 999;
    return d != null && d >= 7;
  }).length;

  return (
    <div>
      <h1 className="page-title">Your cases</h1>
      <div className="page-sub">
        {cases.length === 0
          ? "You have no active case assignments yet."
          : (
            <>
              {active.length} active · {closed.length} closed
              {totalDocketUnread > 0 && <> · <b style={{ color: 'var(--green)' }}>{totalDocketUnread} new docket since your last visit</b></>}
            </>
          )
        }
      </div>

      {cases.length === 0 ? (
        <div className="card empty">
          You haven't been assigned to any RefundLocators cases yet. When Nathan retains you, this page will show every case you're working on — with filings, documents, and live docket updates.
        </div>
      ) : (
        <>
          {/* Summary strip */}
          <div className="stat-grid" style={{ marginBottom: 22 }}>
            <div className="stat">
              <div className="stat-label">Active cases</div>
              <div className="stat-value">{active.length}</div>
            </div>
            <div className="stat" style={{ background: totalDocket7d > 0 ? 'var(--green-soft)' : undefined, borderColor: totalDocket7d > 0 ? '#c3e6d1' : undefined }}>
              <div className="stat-label">Docket · last 7d</div>
              <div className="stat-value" style={{ color: totalDocket7d > 0 ? 'var(--green)' : undefined }}>{totalDocket7d}</div>
            </div>
            <div className="stat" style={{ background: staleCount > 0 ? '#fef3c7' : undefined, borderColor: staleCount > 0 ? '#fcd34d' : undefined }}>
              <div className="stat-label">Stale · ≥7d</div>
              <div className="stat-value" style={{ color: staleCount > 0 ? '#a5731c' : undefined }}>{staleCount}</div>
            </div>
            <div className="stat">
              <div className="stat-label">Closed</div>
              <div className="stat-value">{closed.length}</div>
            </div>
          </div>

          {active.length > 0 && active.map(d => <CaseCard key={d.id} deal={d} />)}

          {closed.length > 0 && (
            <>
              <div style={{ margin: '24px 0 12px', fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>Closed cases</div>
              {closed.map(d => <CaseCard key={d.id} deal={d} closed />)}
            </>
          )}
        </>
      )}

      {/* Combined recent docket activity across all cases */}
      {recentDocket.length > 0 && (
        <div className="card" style={{ marginTop: 28 }}>
          <p className="card-title">Recent docket activity · all your cases</p>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 14, lineHeight: 1.5 }}>
            Live feed of every docket event across every case we've retained you on — newest first. Click any entry to jump to that case.
          </div>
          {recentDocket.map(ev => {
            const meta = ATTORNEY_EVENT_META[ev.event_type] || { label: ev.event_type, color: '#6b6b6b', icon: '•' };
            return (
              <div
                key={ev.id}
                style={{ padding: '14px 0', borderBottom: '1px solid var(--border)', cursor: 'pointer' }}
                onClick={() => navigate('#/case/' + encodeURIComponent(ev.deal_id))}
              >
                <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                  <div style={{ fontSize: 18, width: 24, textAlign: 'center', flexShrink: 0, marginTop: 2 }}>{meta.icon}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', marginBottom: 4 }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: meta.color, letterSpacing: '0.08em', textTransform: 'uppercase', padding: '2px 8px', background: meta.color + '1a', borderRadius: 3 }}>{meta.label}</span>
                      <span style={{ fontSize: 11, color: 'var(--text-muted)', fontVariantNumeric: 'tabular-nums' }}>{ev.event_date}</span>
                    </div>
                    <div style={{ fontSize: 13, color: 'var(--text)', lineHeight: 1.5 }}>{ev.description}</div>
                    <div style={{ fontSize: 11, color: 'var(--navy-mid)', marginTop: 6, fontWeight: 600 }}>{ev._dealName} →</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// Per-case card with status + color-coded "days since last update" + live docket badges.
// Title shows the client name only (no address) — address goes in the detail view.
function displayName(deal) {
  // Legacy convention: some deals have name="Client Name - 123 Main St" concatenated.
  // Some just have the address (older flips). Return the clean client part, or the
  // address if there's no distinct client name portion.
  const raw = (deal.name || '').trim();
  if (!raw) return deal.address || deal.id;
  const parts = raw.split(' - ');
  // If split produces > 1 parts, first part is the client name.
  return parts[0];
}
function displaySecondaryAddress(deal) {
  // Return whatever address we know — from deal.address or the tail of the name.
  if (deal.address) return deal.address;
  const raw = (deal.name || '').trim();
  const parts = raw.split(' - ');
  if (parts.length > 1) return parts.slice(1).join(' - ');
  return '';
}

function CaseCard({ deal, closed }) {
  const m = deal.meta || {};
  const filedAt = m.filed_at || deal.filed_at;
  const statusCls = "b-" + (deal.status || "default");
  const days = deal._lastActivity ? daysSince(deal._lastActivity) : null;
  const cls = closed ? 'muted' : staleClass(days);
  const daysColor = staleColor(cls);
  const daysText = days == null
    ? '—'
    : days === 0 ? 'Updated today'
    : days === 1 ? 'Updated 1d ago'
    : `Updated ${days}d ago`;
  return (
    <div className="case-row" onClick={() => navigate('#/case/' + encodeURIComponent(deal.id))}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div className="case-name">{displayName(deal)}</div>
        <div className="case-meta">
          {m.county ? `${m.county} County` : (deal.address || '')}
          {m.courtCase && <> &nbsp;·&nbsp; Case {m.courtCase}</>}
        </div>
        <div className="case-badges">
          <span className={"badge " + statusCls}>{statusLabel(deal.status)}</span>
          {filedAt && <span className="badge b-muted">Filed {fmtDate(filedAt)}</span>}
          {deal._docketUnread > 0 && (
            <span className="badge" style={{ background: '#d1fae5', color: '#065f46' }}>
              {deal._docketUnread} new docket
            </span>
          )}
          {deal._docket7d > 0 && !deal._docketUnread && (
            <span className="badge b-muted">{deal._docket7d} docket · 7d</span>
          )}
        </div>
      </div>
      <div className="case-right" style={{ color: daysColor, fontWeight: 600 }}>
        {daysText}
      </div>
    </div>
  );
}

            <div className="stat-label">Case Number</div>
            <div className="stat-value">{m.courtCase || 'Pending assignment'}</div>

// ─── Messages thread ──────────────────────────────────
// Two threads in one card:
//   1) With RefundLocators (private) — audience=['attorney']; client never sees
//   2) With Client (supervised) — audience=['client','attorney']; team watching
// Attorney picks the tab; composer stamps the right audience on send.
function MessagesThread({ dealId, session, senderName, isPreview }) {
  const [thread, setThread] = useState('team'); // 'team' | 'client'
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [text, setText] = useState('');
  const [sending, setSending] = useState(false);
  const endRef = React.useRef(null);

  const load = async () => {
    const { data } = await sb.from('messages').select('*').eq('deal_id', dealId).order('created_at', { ascending: true });
    setMessages(data || []);
    setLoading(false);
    await sb.rpc('mark_messages_read', { p_deal_id: dealId });
  };

  useEffect(() => { load(); }, [dealId]);

  useEffect(() => {
    const ch = sb.channel('atty-msgs-' + dealId)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `deal_id=eq.${dealId}` }, (payload) => {
        setMessages(prev => [...prev, payload.new]);
        if (['admin', 'user', 'va'].includes(payload.new.sender_role)) {
          sb.rpc('mark_messages_read', { p_deal_id: dealId });
        }
      })
      .subscribe();
    return () => { sb.removeChannel(ch); };
  }, [dealId]);

  useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, [messages, thread]);

  // Filter by active thread. Team thread = messages where audience is
  // ['attorney'] (no client). Client thread = messages where audience
  // includes BOTH 'attorney' and 'client' (joint).
  const threadMessages = messages.filter(m => {
    const aud = m.audience || ['client'];
    const inTeamThread = aud.includes('attorney') && !aud.includes('client');
    const inClientThread = aud.includes('attorney') && aud.includes('client');
    // Attorney's own messages: visible in whichever thread they were sent to
    if (thread === 'team') return inTeamThread || (m.sender_role === 'attorney' && !aud.includes('client'));
    return inClientThread || (m.sender_role === 'attorney' && aud.includes('client'));
  });

  const send = async () => {
    const body = text.trim();
    if (!body || sending) return;
    if (isPreview) { alert('Preview mode — message not sent.'); return; }
    setSending(true);
    const audience = thread === 'team' ? ['attorney'] : ['client', 'attorney'];
    const { error } = await sb.from('messages').insert({
      deal_id: dealId,
      sender_id: session.user.id,
      sender_role: 'attorney',
      sender_name: senderName || session.user.email,
      audience,
      body,
    });
    setSending(false);
    if (error) { alert('Could not send: ' + error.message); return; }
    setText('');
  };

  const counts = {
    team: messages.filter(m => {
      const aud = m.audience || ['client'];
      return aud.includes('attorney') && !aud.includes('client');
    }).length,
    client: messages.filter(m => {
      const aud = m.audience || ['client'];
      return aud.includes('attorney') && aud.includes('client');
    }).length,
  };

  const tabBtn = (key, label, sub) => (
    <button onClick={() => setThread(key)} style={{
      flex: 1,
      padding: '10px 12px',
      background: thread === key ? 'var(--navy)' : 'transparent',
      color: thread === key ? '#fffcf5' : 'var(--text-muted)',
      border: '1px solid ' + (thread === key ? 'var(--navy)' : 'var(--border-strong)'),
      borderRadius: 8,
      fontFamily: 'inherit',
      fontSize: 13,
      fontWeight: 600,
      cursor: 'pointer',
      textAlign: 'left',
      transition: 'all .12s',
    }}>
      <div>{label} {counts[key] > 0 && <span style={{ marginLeft: 6, fontSize: 10, opacity: 0.85 }}>{counts[key]}</span>}</div>
      <div style={{ fontSize: 10, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>{sub}</div>
    </button>
  );

  const placeholder = thread === 'team'
    ? 'Private message to the RefundLocators team — client won\'t see this.'
    : 'Message to the client — RefundLocators team is also on this thread.';

  return (
    <div className="card">
      <p className="card-title">Messages</p>
      <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
        {tabBtn('team', '🔒 With RefundLocators', 'Private — client cannot see')}
        {tabBtn('client', '💬 With Client', 'Team-supervised thread')}
      </div>

      {loading ? (
        <div className="empty" style={{ padding: '12px 0' }}>Loading…</div>
      ) : threadMessages.length === 0 ? (
        <div style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.6, padding: '8px 0 16px', background: 'var(--bg-card-alt)', borderRadius: 6, padding: 12 }}>
          {thread === 'team'
            ? 'No messages in the private thread yet. Use this for quick questions, coordination, clarifications — the client will not see anything you send here.'
            : 'No messages with the client yet. The RefundLocators team sees this thread too — everything here is for the client\'s benefit and transparent to the team.'}
        </div>
      ) : (
        <div style={{ maxHeight: 420, overflowY: 'auto', marginBottom: 12 }}>
          {threadMessages.map(m => {
            const fromMe = m.sender_role === 'attorney';
            const fromClient = m.sender_role === 'client';
            return (
              <div key={m.id} style={{ marginBottom: 14, display: 'flex', flexDirection: 'column', alignItems: fromMe ? 'flex-end' : 'flex-start' }}>
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>
                  <b style={{ color: fromMe ? 'var(--navy-mid)' : fromClient ? '#8b5cf6' : 'var(--amber)' }}>
                    {fromMe ? 'You' : fromClient ? 'Client' : (m.sender_name || 'Team')}
                  </b>
                  {' · '}{new Date(m.created_at).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })}
                </div>
                <div style={{
                  maxWidth: '85%',
                  padding: '10px 14px',
                  borderRadius: 14,
                  background: fromMe ? 'var(--navy)' : fromClient ? '#f3e8ff' : 'var(--gold-soft)',
                  color: fromMe ? '#fffcf5' : 'var(--text)',
                  fontSize: 14,
                  lineHeight: 1.5,
                  whiteSpace: 'pre-wrap',
                }}>
                  {m.body}
                </div>
              </div>
            );
          })}
          <div ref={endRef} />
        </div>
      )}
      <div style={{ display: 'flex', gap: 8, alignItems: 'flex-end' }}>
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && text.trim()) send(); }}
          placeholder={placeholder}
          rows={2}
          style={{
            flex: 1,
            padding: '10px 12px',
            border: '1px solid var(--border-strong)',
            borderRadius: 8,
            fontSize: 14,
            fontFamily: 'inherit',
            color: 'var(--text)',
            background: 'var(--bg-card)',
            resize: 'vertical',
            minHeight: 44,
            lineHeight: 1.5,
          }}
        />
        <button onClick={send} disabled={!text.trim() || sending} className="btn-primary" style={{ flexShrink: 0 }}>
          {sending ? 'Sending…' : 'Send'}
        </button>
      </div>
      <div style={{ fontSize: 11, color: 'var(--text-subtle)', marginTop: 6 }}>
        {thread === 'team'
          ? '🔒 Private — only the RefundLocators team reads this thread. ⌘/Ctrl + Enter to send.'
          : '💬 Client + team see this thread. ⌘/Ctrl + Enter to send.'}
      </div>
    </div>
  );
}

// ─── Docket Section (attorney) ────────────────────────
// Shows every docket event on this case. RLS limits visibility to
// the attorney's assigned cases only.
const ATTORNEY_EVENT_META = {
  disbursement_ordered: { label: "Disbursement Ordered", color: "#2d7a4f", icon: "💰" },
  disbursement_paid:    { label: "Disbursement Paid",    color: "#2d7a4f", icon: "✅" },
  hearing_scheduled:    { label: "Hearing Scheduled",    color: "#1e40af", icon: "📅" },
  hearing_continued:    { label: "Hearing Continued",    color: "#a5731c", icon: "📅" },
  judgment_entered:     { label: "Judgment Entered",     color: "#4338ca", icon: "⚖"  },
  order_entered:        { label: "Order Entered",        color: "#4338ca", icon: "📜" },
  motion_filed:         { label: "Motion Filed",         color: "#4338ca", icon: "📝" },
  objection_filed:      { label: "Objection Filed",      color: "#a83232", icon: "⚠"  },
  notice_of_claim:      { label: "Notice of Claim",      color: "#a83232", icon: "👥" },
  continuance_granted:  { label: "Continuance Granted",  color: "#6b6b6b", icon: "⏸"  },
  answer_filed:         { label: "Answer Filed",         color: "#6b6b6b", icon: "📝" },
  docket_updated:       { label: "Docket Update",        color: "#6b6b6b", icon: "•"  },
};

function UnifiedTimeline({ dealId, activity }) {
  const [docket, setDocket] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    const { data } = await sb.from('docket_events')
      .select('*')
      .eq('deal_id', dealId)
      .order('event_date', { ascending: false })
      .order('received_at', { ascending: false });
    setDocket(data || []);
    setLoading(false);
  };

  useEffect(() => { load(); }, [dealId]);

  useEffect(() => {
    const ch = sb.channel('atty-timeline-' + dealId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'docket_events', filter: `deal_id=eq.${dealId}` }, load)
      .subscribe();
    return () => { sb.removeChannel(ch); };
  }, [dealId]);

  if (loading) return null;

  const liveDocket = docket.filter(e => !e.is_backfill);
  const historyDocket = docket.filter(e => e.is_backfill);

  const activityItems = (activity || []).map(a => ({ kind: 'activity', id: 'a-' + a.id, date: a.created_at, data: a }));
  const docketItems = liveDocket.map(e => ({ kind: 'docket', id: 'd-' + e.id, date: e.event_date || e.received_at, data: e }));
  const merged = [...activityItems, ...docketItems].sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());

  const renderDocket = (e) => {
    const meta = ATTORNEY_EVENT_META[e.event_type] || { label: e.event_type, color: '#6b6b6b', icon: '•' };
    return (
      <div className="timeline-item" key={'d-' + e.id} style={{ padding: '12px 10px', borderRadius: 6 }}>
        <div className="timeline-dot" style={{ background: meta.color }}></div>
        <div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', marginBottom: 4 }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: meta.color, letterSpacing: '0.08em', textTransform: 'uppercase', padding: '2px 8px', background: meta.color + '1a', borderRadius: 3 }}>{meta.icon} {meta.label}</span>
          </div>
          <div className="timeline-action" style={{ lineHeight: 1.5 }}>{e.description}</div>
          {(e.court_system || e.case_number) && (
            <div style={{ fontSize: 11, color: 'var(--text-subtle)', marginTop: 4, display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              {e.court_system && <span>{e.court_system}</span>}
              {e.case_number && <span>Case {e.case_number}</span>}
            </div>
          )}
          {e.document_url && (
            <a href={e.document_url} target="_blank" rel="noreferrer" style={{ display: 'inline-block', fontSize: 12, color: 'var(--navy-mid)', textDecoration: 'none', fontWeight: 600, marginTop: 6 }}>
              📄 View court document →
            </a>
          )}
          <div style={{ fontSize: 10, color: '#a5731c', fontWeight: 700, marginTop: 4, letterSpacing: '0.04em' }}>
            📋 Court docket · auto-ingested
          </div>
        </div>
        <div className="timeline-date">{e.event_date}</div>
      </div>
    );
  };

  const renderActivity = (a) => {
    const vis = a.visibility || ['team'];
    const clientSees = vis.includes('client');
    const isMine = (a.action || '').startsWith('👨‍⚖️ Attorney update:');
    const cleanAction = isMine ? a.action.replace(/^👨‍⚖️ Attorney update:\s*/, '') : a.action;
    const badge = isMine
      ? { icon: '👨‍⚖️', text: clientSees ? 'Your post · client sees' : 'Your post · internal', color: clientSees ? '#2d7a4f' : '#4338ca' }
      : clientSees
        ? { icon: '👤', text: 'Client sees this', color: '#2d7a4f' }
        : { icon: '🔒', text: 'Internal only', color: '#6b6b6b' };
    return (
      <div className="timeline-item" key={'a-' + a.id} style={{ background: isMine ? 'rgba(67, 56, 202, 0.04)' : 'transparent', padding: '12px 10px', borderRadius: 6 }}>
        <div className="timeline-dot" style={{ background: badge.color }}></div>
        <div>
          <div className="timeline-action" style={{ lineHeight: 1.5 }}>{cleanAction}</div>
          <div style={{ fontSize: 10, color: badge.color, fontWeight: 700, marginTop: 4, letterSpacing: '0.04em' }}>
            {badge.icon} {badge.text}
          </div>
        </div>
        <div className="timeline-date">{fmtDate(a.created_at)}</div>
      </div>
    );
  };

  const total = merged.length;

  return (
    <div className="card">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, flexWrap: 'wrap', gap: 8 }}>
        <p className="card-title" style={{ margin: 0 }}>Case timeline <span style={{ color: 'var(--text-subtle)', fontWeight: 400 }}>({total})</span></p>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', display: 'flex', gap: 12, flexWrap: 'wrap' }}>
          <span>🔒 Internal</span>
          <span>👤 Client sees</span>
          <span>👨‍⚖️ Your posts</span>
          <span>📋 Court docket</span>
        </div>
      </div>
      <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 14, lineHeight: 1.5 }}>
        Case updates, messages, and every event on the court docket — auto-ingested from the county scraper. Most recent at the top.
      </div>
      {total === 0 ? (
        <div className="empty" style={{ padding: '12px 0' }}>No activity yet. Post a case update above to start the record.</div>
      ) : (
        <div style={{ maxHeight: 560, overflowY: 'auto', paddingRight: 6 }}>
          {merged.map(item => item.kind === 'docket' ? renderDocket(item.data) : renderActivity(item.data))}
        </div>
      )}

      {historyDocket.length > 0 && (
        <details style={{ marginTop: 14 }}>
          <summary style={{ cursor: 'pointer', fontSize: 13, color: 'var(--navy-mid)', fontWeight: 600, padding: '8px 0' }}>
            📜 Case history · {historyDocket.length} historical docket {historyDocket.length === 1 ? 'entry' : 'entries'}
          </summary>
          <div style={{ maxHeight: 360, overflowY: 'auto', paddingRight: 6, marginTop: 8 }}>
            {historyDocket.map(renderDocket)}
          </div>
        </details>
      )}
    </div>
  );
}

// ─── Update form ──────────────────────────────────────
// Attorney posts a case update. Two visibility options:
//  - Internal (default): RefundLocators team + attorney only
//  - Share with client: team + attorney + client sees it in their portal timeline
function UpdateForm({ dealId, onPosted, isPreview }) {
  const [text, setText] = useState("");
  const [shareWithClient, setShareWithClient] = useState(false);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  const post = async () => {
    if (!text.trim()) return;
    if (isPreview) { setMsg({ type: 'error', text: 'Preview mode — update not posted.' }); return; }
    setBusy(true); setMsg(null);
    const { error } = await sb.rpc('attorney_post_update', {
      p_deal_id: dealId,
      p_note: text.trim(),
      p_share_with_client: shareWithClient,
    });
    setBusy(false);
    if (error) { setMsg({ type: 'error', text: error.message }); return; }
    setText("");
    setShareWithClient(false);
    setMsg({ type: 'success', text: shareWithClient ? 'Update posted — client will see it.' : 'Update posted — internal to team only.' });
    onPosted?.();
  };

  return (
    <div className="card">
      <p className="card-title">Post a case update</p>
      <div className="update-form">
        <textarea
          className="update-text"
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder="e.g. Hearing continued to May 15. Filed response to motion to intervene."
          maxLength={2000}
        />

        {/* Client-visibility toggle — attorney chooses audience per post */}
        <label style={{ display: 'flex', alignItems: 'flex-start', gap: 10, padding: '12px 14px', background: shareWithClient ? 'var(--gold-soft)' : 'var(--bg-card-alt)', border: '1px solid ' + (shareWithClient ? 'var(--gold)' : 'var(--border)'), borderRadius: 8, cursor: isPreview ? 'not-allowed' : 'pointer', transition: 'all 0.12s' }}>
          <input
            type="checkbox"
            checked={shareWithClient}
            onChange={e => setShareWithClient(e.target.checked)}
            disabled={isPreview}
            style={{ marginTop: 3, cursor: 'inherit', width: 16, height: 16, flexShrink: 0 }}
          />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--navy)' }}>
              {shareWithClient ? '👤 Client will see this update' : '🔒 Internal — team + attorney only'}
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 4, lineHeight: 1.5 }}>
              {shareWithClient
                ? 'This update will appear in the homeowner\'s case portal timeline. Use plain language — no internal jargon.'
                : 'The homeowner will NOT see this. Safe for internal strategy, objections, motion drafts, billing notes.'}
            </div>
          </div>
        </label>

        <button className="btn-primary" onClick={post} disabled={busy || !text.trim()}>
          {busy ? 'Posting…' : (shareWithClient ? 'Post (client will see)' : 'Post (internal)')}
        </button>
        {msg && <div className={msg.type === 'success' ? 'success' : 'error'}>{msg.text}</div>}
      </div>
    </div>
  );
}

// ─── Documents section ────────────────────────────────
function DocumentsSection({ dealId, documents, onChange, isPreview }) {
  const [uploading, setUploading] = useState(false);
  const [err, setErr] = useState(null);
  const [pins, setPins] = useState([]);

  useEffect(() => {
    (async () => {
      const { data } = await sb.from('deal_library_pins')
        .select('id, pinned_for, label, pinned_at, library_documents(id, title, path, size, mime_type, kind, external_url, description)')
        .eq('deal_id', dealId)
        .contains('pinned_for', ['attorney']);
      setPins(data || []);
    })();
  }, [dealId]);

  const openPinned = async (pin) => {
    const d = pin.library_documents;
    if (!d) return;
    if (d.kind === 'link' && d.external_url) { window.open(d.external_url, '_blank'); return; }
    if (!d.path) return;
    const { data, error } = await sb.storage.from('library').createSignedUrl(d.path, 600);
    if (error || !data?.signedUrl) { alert("Couldn't open pinned resource: " + (error?.message || 'unknown')); return; }
    window.open(data.signedUrl, '_blank');
  };

  const upload = async (file) => {
    if (!file) return;
    if (isPreview) { setErr('Preview mode — upload disabled.'); return; }
    setUploading(true); setErr(null);
    try {
      const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = `${dealId}/atty-${Date.now()}-${safe}`;
      const up = await sb.storage.from('deal-docs').upload(path, file, { contentType: file.type });
      if (up.error) throw up.error;
      const { error } = await sb.from('documents').insert({
        deal_id: dealId,
        name: file.name,
        path,
        size: file.size,
        uploaded_by: (await sb.auth.getUser()).data.user.id,
      });
      if (error) throw error;
      // Also log an activity note so team sees it
      await sb.rpc('attorney_post_update', {
        p_deal_id: dealId,
        p_note: 'Uploaded document: ' + file.name,
      });
      onChange?.();
    } catch (e) {
      setErr(e.message || 'Upload failed');
    } finally {
      setUploading(false);
    }
  };

  const open = async (doc) => {
    const { data, error } = await sb.storage.from('deal-docs').createSignedUrl(doc.path, 600);
    if (error || !data?.signedUrl) {
      alert('Could not open document. Call Nathan at (513) 516-2306.');
      return;
    }
    window.open(data.signedUrl, '_blank');
  };

  const fmtSize = (b) => !b ? '' : b < 1024 ? `${b} B` : b < 1024 * 1024 ? `${(b / 1024).toFixed(1)} KB` : `${(b / 1024 / 1024).toFixed(1)} MB`;

  return (
    <div className="card">
      <p className="card-title">Documents <span style={{ color: 'var(--text-subtle)' }}>({documents.length})</span></p>
      <div style={{ marginBottom: 14 }}>
        <label className="upload-label">
          {uploading ? 'Uploading…' : '+ Upload document'}
          <input type="file" style={{ display: 'none' }} disabled={uploading} onChange={e => upload(e.target.files[0])} />
        </label>
      </div>
      {err && <div className="error" style={{ marginBottom: 10 }}>{err}</div>}

      {/* Pinned library resources — reference docs, templates, SOPs the team has
          curated for every attorney on this case. Show at top with a gold accent. */}
      {pins.length > 0 && (
        <>
          <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--navy-mid)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 8, marginTop: 4 }}>
            📌 Provided by RefundLocators
          </div>
          {pins.map(pin => {
            const d = pin.library_documents;
            if (!d) return null;
            const icon = d.kind === 'video' ? '🎥' : d.kind === 'image' ? '🖼' : d.kind === 'link' ? '🔗' : d.kind === 'template' ? '📝' : '📄';
            return (
              <div className="doc-row" key={'pin-' + pin.id} onClick={() => openPinned(pin)} style={{ cursor: 'pointer' }}>
                <div className="doc-icon" style={{ background: 'var(--gold-soft)' }}>{icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="doc-name">{pin.label || d.title}</div>
                  <div className="doc-meta">
                    {fmtSize(d.size)}
                    {d.description && ` · ${d.description}`}
                  </div>
                </div>
                <button className="doc-action" onClick={(e) => { e.stopPropagation(); openPinned(pin); }}>View</button>
              </div>
            );
          })}
          <div style={{ height: 12 }} />
          <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text-muted)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 8 }}>
            Case files
          </div>
        </>
      )}

      {documents.length === 0 && pins.length === 0 ? (
        <div className="empty" style={{ padding: '12px 0' }}>No documents yet. Upload filings, court orders, or correspondence here.</div>
      ) : documents.length === 0 ? (
        <div className="empty" style={{ padding: '12px 0' }}>No case-specific files yet. Upload filings, court orders, or correspondence.</div>
      ) : (
        documents.map(d => (
          <div className="doc-row" key={d.id}>
            <div className="doc-icon">📄</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="doc-name">{d.name}</div>
              <div className="doc-meta">{fmtSize(d.size)} · Added {fmtDate(d.created_at)}</div>
            </div>
            <button className="doc-action" onClick={() => open(d)}>View</button>
          </div>
        ))
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
